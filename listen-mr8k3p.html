<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex">
<meta http-equiv="Cache-Control" content="no-store" />
<title>MOSUN — First Listen</title>
<link rel="stylesheet" href="theme.css">
<style>
  html, body { margin:0; height:100%; background:#000; }
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px;
    font-family:var(--font-body, system-ui, sans-serif); color:#E8E6D9; text-align:center;
    background:radial-gradient(circle at 50% 42%, #2a1206 0%, #150a04 42%, #000 76%); }
  .wrap { max-width:34ch; }
  .k { font-size:11px; letter-spacing:0.28em; text-transform:uppercase; color:#8A8880; margin-bottom:22px; }
  .k .dot { color:#F6A25C; }
  h1 { font-family:var(--font-display, 'Century Gothic', system-ui, sans-serif); font-weight:400;
    text-transform:uppercase; letter-spacing:0.08em; font-size:clamp(30px,8vw,52px); line-height:1.05; margin:0; }
  p { font-size:15px; line-height:1.6; color:#B9B7AC; margin-top:20px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="k">MOSUN <span class="dot">·</span> First Listen</div>
    <h1>This window has closed.</h1>
    <p>Thank you for being early. The finished version is on its way — the first listeners hear it first.</p>
  </div>
</body>
</html>
