<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>MOSUN — Listen</title>
<link rel="stylesheet" href="theme.css">
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ background:var(--ink); color:var(--cream); }
body{ font-family:var(--font-body); line-height:1.5; -webkit-font-smoothing:antialiased; overflow-x:hidden; }
::selection{ background:var(--saffron); color:var(--ink); }
img{ display:block; max-width:100%; }
.hidden{ display:none !important; }
html.locked, body.locked{ overflow:hidden; height:100%; }

/* ===== INK-BLOOM ground (saffron ember) — reusable module CSS ===== */
#bloom, .ink-fallback { position:fixed; inset:0; display:block; width:100%; height:100%; pointer-events:none; }
#bloom { z-index:1; background:#000; }                 /* canvas ABOVE the fallback — fallback shows only when WebGL is off */
/* CSS-only fallback: saffron core → oxblood → black, faint offset violet depth, grain, slow drift */
.ink-fallback {
  z-index:0;
  background:
    radial-gradient(circle at 61% 59%, rgba(59,21,48,0.40) 0%, rgba(59,21,48,0) 40%),
    radial-gradient(circle at 50% 46%, #FFF6E8 0%, #F6A25C 5%, #D8823A 11%, #7E0101 26%, #240303 46%, #000 70%);
  animation:inkdrift 34s ease-in-out infinite; will-change:transform; transform:scale(1.04);
}
.ink-fallback::after {
  content:""; position:absolute; inset:0; pointer-events:none; opacity:0.08; mix-blend-mode:soft-light;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  background-size:160px 160px;
}
@keyframes inkdrift { 0%,100% { transform:scale(1.04) translate(0,0); } 50% { transform:scale(1.09) translate(-1.1%, 0.9%); } }
.ink-live .ink-fallback { animation:none; }      /* shader live → don't animate hidden fallback */
@media (prefers-reduced-motion: reduce) { .ink-fallback { animation:none; } }
/* legibility scrim: tame the bright core behind centred text + edge vignette (above bloom, below content) */
.bloom-scrim { position:fixed; inset:0; z-index:1; pointer-events:none;
  background:
    radial-gradient(ellipse 58% 42% at 50% 52%, rgba(0,0,0,0.46), rgba(0,0,0,0) 70%),
    radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0) 42%, rgba(0,0,0,0.55) 100%); }

/* ===== custom cursor (desktop, fine pointer) ===== */
#cursor{ position:fixed; top:0; left:0; width:41px; height:41px; margin:-20.5px 0 0 -20.5px; border-radius:50%;
  border:1px solid var(--saffron); z-index:120; pointer-events:none; mix-blend-mode:difference; opacity:0;
  transition:width .35s var(--ease), height .35s var(--ease), margin .35s var(--ease), opacity .4s var(--ease), background .35s var(--ease); }
#cursor.show{ opacity:0.5; }
#cursor.grow{ width:74px; height:74px; margin:-37px 0 0 -37px; background:rgba(246,162,92,0.08); box-shadow:0 0 18px rgba(246,162,92,0.10); }
@media (pointer:coarse){ #cursor{ display:none; } }
/* light-trail cursor (long-exposure crimson streaks) */
#trail{ position:fixed; inset:0; z-index:115; pointer-events:none; }
@media (pointer:coarse){ #trail{ display:none; } }
@media (prefers-reduced-motion: reduce){ #trail{ display:none; } }

/* ===== preloader ===== */
#pre{ position:fixed; inset:0; z-index:200; background:var(--ink); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px;
  transition:opacity 1s var(--ease); }
#pre.gone{ opacity:0; pointer-events:none; }
#pre .logo{ width:76px; height:76px; }
#pre .wordmark{ font-family:var(--font-display); font-weight:400; font-size:22px; letter-spacing:0.34em; text-transform:uppercase; color:var(--cream); }
#pre .count{ font-family:var(--font-display); font-weight:400; font-size:clamp(64px,16vw,140px); line-height:1; color:var(--saffron); font-variant-numeric:tabular-nums; }
#pre .lbl{ font-size:10px; letter-spacing:0.4em; text-transform:uppercase; color:var(--n3); }

/* ===== topbar (mute) ===== */
.topbar{ position:fixed; top:0; left:0; right:0; z-index:90; display:flex; justify-content:space-between; align-items:center;
  padding:18px 22px; pointer-events:none; }
.topbar > *{ pointer-events:auto; }
.markk{ font-family:var(--font-display); font-weight:400; font-size:12px; letter-spacing:0.32em; text-transform:uppercase; color:var(--n3); display:flex; align-items:center; gap:8px; }
.markk img{ width:20px; height:20px; }
.markk .dot{ color:var(--saffron); }
.iconbtn{ font-family:var(--font-body); font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--n3);
  background:rgba(0,0,0,0.4); border:1px solid var(--hairline); border-radius:var(--r-pill); padding:7px 13px; cursor:pointer; transition:color .5s var(--ease), border-color .5s var(--ease); }
.iconbtn:hover{ color:var(--saffron); border-color:var(--saffron); }

/* ===== marquee ===== */
.marquee{ position:relative; z-index:2; overflow:hidden; white-space:nowrap; border-top:1px solid var(--hairline); border-bottom:1px solid var(--hairline); padding:14px 0; }
.marquee .run{ display:inline-block; will-change:transform; animation:marq 26s linear infinite; }
.marquee span{ font-family:var(--font-display); font-weight:400; font-size:15px; letter-spacing:0.3em; text-transform:uppercase; color:var(--n2); padding:0 22px; }
.marquee span b{ color:var(--saffron); font-weight:400; }
@keyframes marq{ to{ transform:translateX(-50%); } }
@media (prefers-reduced-motion: reduce){ .marquee .run{ animation:none; } }

/* ===== sections ===== */
#track{ position:relative; z-index:2; }
.sec{ position:relative; min-height:100vh; min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:96px 22px 140px; }
.sec-in{ width:100%; max-width:560px; text-align:center; }
.kicker{ font-size:10px; letter-spacing:0.32em; text-transform:uppercase; color:var(--saffron); margin-bottom:20px; }
.htitle{ font-family:var(--font-body); font-weight:300; text-transform:uppercase; letter-spacing:0.04em; line-height:1.05;
  font-size:clamp(34px,9vw,68px); margin-bottom:18px; }
.htitle .word{ display:inline-block; }
.htitle .char{ display:inline-block; }
.htitle .em{ font-family:var(--font-display); font-weight:400; color:var(--saffron); }
.qprompt{ font-size:16px; color:var(--n2); max-width:460px; margin:0 auto 34px; }
.scrollcue{ margin-top:42px; font-size:10px; letter-spacing:0.26em; text-transform:uppercase; color:var(--n4); }
.scrollcue .arr{ display:block; margin-top:8px; color:var(--saffron); animation:bob 2.4s var(--ease) infinite; }
@keyframes bob{ 0%,100%{ transform:translateY(0); opacity:.5; } 50%{ transform:translateY(6px); opacity:1; } }
@media (prefers-reduced-motion: reduce){ .scrollcue .arr{ animation:none; } }

/* title orb */
.titleorb{ margin:0 auto 32px; position:relative; display:inline-flex; }
.titleorb .orbwrap{ position:relative; display:inline-flex; align-items:center; justify-content:center; }
.titleorb .orbwrap::before{ content:''; position:absolute; inset:-12%; border-radius:50%; pointer-events:none;
  background:radial-gradient(circle, rgba(246,162,92,0.28), transparent 68%); animation:breathe 5.6s var(--ease) infinite; }
.orb{ border-radius:50%; object-fit:cover; background:#070707; border:1px solid var(--border-strong); position:relative; z-index:1; }
.orb.big{ width:min(56vw,220px); aspect-ratio:1; }
.orbph{ display:flex; align-items:center; justify-content:center; font-family:var(--font-deco); color:var(--saffron); font-size:64px; }
.orbmark{ width:48%; height:auto; }
.orb.spin{ animation:spin 26s linear infinite; }
@keyframes breathe{ 0%,100%{ opacity:.4; transform:scale(.97); } 50%{ opacity:.82; transform:scale(1.05); } }
@keyframes spin{ to{ transform:rotate(360deg); } }
@media (prefers-reduced-motion: reduce){ .titleorb .orbwrap::before{ animation:none; } .orb.spin{ animation:none; } }

/* ===== buttons / magnetic CTAs ===== */
.btn{ font-family:var(--font-body); font-size:12px; letter-spacing:0.2em; text-transform:uppercase; padding:15px 34px;
  border-radius:var(--r-pill); border:1px solid var(--border-strong); background:transparent; color:var(--cream); cursor:pointer; position:relative;
  transition:border-color .8s var(--ease), background .8s var(--ease), color .8s var(--ease), box-shadow .8s var(--ease); will-change:transform; }
.btn:hover{ border-color:var(--saffron); box-shadow:0 0 0 1px var(--saffron), 0 0 40px -6px var(--saffron); }
.btn.primary{ background:var(--saffron); color:var(--ink); border-color:var(--saffron); }
.btn.primary:hover{ background:var(--saffron-hover); border-color:var(--saffron-hover); box-shadow:0 0 52px -6px var(--saffron); }
.btn.small{ padding:11px 20px; font-size:11px; }
.btn.ghost{ border-color:transparent; color:var(--n3); }
.btn.ghost:hover{ color:var(--saffron); box-shadow:none; }
.btn:disabled{ opacity:.4; cursor:not-allowed; box-shadow:none; }
.backlink{ font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--n3); background:none; border:none; cursor:pointer; }
.backlink:hover{ color:var(--saffron); }
.bigplay{ margin-top:30px; }
.actions{ display:flex; gap:12px; align-items:center; justify-content:center; flex-wrap:wrap; margin-top:8px; }

/* ===== reaction faces ===== */
.faces{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; max-width:440px; margin:0 auto; }
.face{ flex:1 1 84px; min-width:84px; max-width:108px; aspect-ratio:1; border-radius:var(--r-card);
  border:1px solid var(--border-strong); background:#070707; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
  transition:border-color .5s var(--ease), box-shadow .7s var(--ease), transform .4s var(--ease); }
.face .em{ font-size:30px; line-height:1; }
.face .fl{ font-size:9px; letter-spacing:0.16em; text-transform:uppercase; color:var(--n3); }
.face:hover, .face.sel{ border-color:var(--saffron); transform:translateY(-3px); box-shadow:0 0 0 1px var(--saffron), 0 0 40px -10px var(--saffron); }
.face.sel .fl{ color:var(--saffron); }

/* ===== hook charge ===== */
.chargenum{ font-family:var(--font-display); font-size:clamp(56px,16vw,104px); line-height:.9; color:var(--cream); text-align:center; margin-bottom:22px; }
.chargenum .cnum.ghost{ color:var(--n4); }
.chargenum .of{ display:block; font-family:var(--font-body); font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--n3); margin-top:10px; }
.meter{ display:flex; gap:8px; justify-content:center; max-width:360px; margin:0 auto; touch-action:none; cursor:pointer; user-select:none; }
.seg{ flex:1; height:48px; border-radius:8px; border:1px solid var(--border-strong); background:#070707;
  transition:background .35s var(--ease), box-shadow .5s var(--ease), border-color .35s var(--ease); }
.seg.lit{ background:var(--saffron); border-color:var(--saffron); box-shadow:0 0 26px -8px var(--saffron); }
.chargelab{ display:flex; justify-content:space-between; gap:14px; max-width:360px; margin:16px auto 0; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--n4); }

/* ===== choices / fields ===== */
.opts{ display:flex; flex-direction:column; gap:11px; max-width:360px; width:100%; margin:0 auto; }
.opt{ text-align:center; font-family:var(--font-body); font-size:16px; color:var(--cream);
  border:1px solid var(--border-strong); background:#070707; border-radius:var(--r-card); padding:18px 20px; cursor:pointer;
  transition:border-color .5s var(--ease), box-shadow .7s var(--ease), transform .4s var(--ease); }
.opt:hover, .opt.sel{ border-color:var(--saffron); transform:translateY(-2px); box-shadow:0 0 0 1px var(--saffron), 0 0 34px -12px var(--saffron); }
.field{ width:100%; max-width:460px; margin:0 auto; display:block; font-family:var(--font-body); font-size:16px; color:var(--cream); text-align:left;
  background:transparent; border:1px solid var(--border-strong); border-radius:var(--r-input); padding:13px 14px; outline:none; resize:vertical; }
.field:focus{ border-color:var(--saffron); }
.field::placeholder{ color:var(--n4); }
.line{ width:100%; max-width:420px; margin:0 auto; display:block; font-family:var(--font-display); font-size:24px; letter-spacing:0.06em; text-transform:uppercase; text-align:center;
  color:var(--cream); background:transparent; border:none; border-bottom:1px solid var(--border-strong); padding:12px 2px; outline:none; }
.line:focus{ border-color:var(--saffron); }
.line::placeholder{ color:var(--n4); font-family:var(--font-body); letter-spacing:normal; text-transform:none; }

/* ripple */
.ripple{ position:fixed; z-index:110; pointer-events:none; border-radius:50%; width:14px; height:14px; margin:-7px 0 0 -7px;
  background:radial-gradient(circle, rgba(246,162,92,0.65), transparent 78%); transform:scale(0); opacity:1; animation:rip 620ms var(--ease) forwards; }
@keyframes rip{ to{ transform:scale(26); opacity:0; } }

/* ===== player (full-size centerpiece in its own section) + persistent pill ===== */
.playerhost{ width:100%; max-width:520px; margin:20px auto 0; }
.playerframe{ width:100%; border:1px solid var(--hairline); border-radius:var(--r-card); background:#0a0a0a; overflow:hidden;
  box-shadow:0 0 60px -24px var(--saffron); }
.playerframe iframe{ width:100%; border:0; display:block; }
.nowbar{ position:fixed; bottom:16px; left:50%; transform:translateX(-50%); z-index:85; opacity:0; pointer-events:none; white-space:nowrap;
  font-size:10px; letter-spacing:0.22em; text-transform:uppercase; color:var(--n2);
  background:rgba(3,3,3,0.85); border:1px solid var(--hairline); border-radius:var(--r-pill); padding:8px 16px; backdrop-filter:blur(8px);
  transition:opacity .8s var(--ease); }
.nowbar.on{ opacity:1; }
.nowbar b{ color:var(--saffron); font-weight:400; }
#scrollhint, #playhint{ position:fixed; left:50%; bottom:86px; z-index:88; opacity:0; pointer-events:none;
  transform:translate(-50%,14px) scale(.92); display:flex; flex-direction:column; align-items:center; gap:7px;
  background:rgba(3,3,3,0.92); border:1px solid var(--border-strong); border-radius:var(--r-card); padding:14px 24px; backdrop-filter:blur(8px);
  box-shadow:0 0 56px -16px var(--saffron); transition:opacity .7s var(--ease), transform .7s var(--ease); }
#scrollhint.on, #playhint.on{ opacity:1; transform:translate(-50%,0) scale(1); }
#scrollhint .t, #playhint .t{ font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--cream); }
#scrollhint .ar{ color:var(--saffron); font-size:18px; line-height:1; animation:bob 2.2s var(--ease) infinite; }
#playhint .ar{ color:var(--saffron); font-size:16px; line-height:1; animation:pulse 1.4s var(--ease) infinite; }
.playerframe.pulse{ animation:framepulse 1.9s var(--ease) infinite; border-color:var(--saffron); }
@keyframes framepulse{ 0%,100%{ box-shadow:0 0 46px -18px var(--saffron); } 50%{ box-shadow:0 0 80px -4px var(--saffron); } }
@keyframes pulse{ 0%,100%{ transform:scale(1); opacity:.7; } 50%{ transform:scale(1.22); opacity:1; } }
@media (prefers-reduced-motion: reduce){ #scrollhint, #playhint{ transition:opacity .4s var(--ease); } #scrollhint.on, #playhint.on{ transform:translate(-50%,0); }
  #scrollhint .ar, #playhint .ar{ animation:none; } .playerframe.pulse{ animation:none; } }

/* ===== reveal ===== */
.reveal .thx{ font-family:var(--font-display); font-weight:400; text-transform:uppercase; letter-spacing:0.12em; font-size:clamp(34px,9vw,64px); }
.reveal .note{ font-family:var(--font-quote); font-style:italic; font-size:clamp(18px,5vw,24px); color:var(--saffron-soft); line-height:1.45; max-width:480px; margin:24px auto 0; }
.reveal .signed{ font-family:var(--font-display); color:var(--saffron); font-size:30px; letter-spacing:0.3em; text-transform:uppercase; text-indent:0.3em; margin-top:14px; }
.sendstate{ font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:var(--n3); margin-top:30px; min-height:18px; }
.sendstate.ok{ color:var(--saffron); } .sendstate.err{ color:var(--saffron-soft); }
/* (sunrise burst removed — the ink-bloom surges to full on finish instead) */

/* ===== builder ===== */
.build{ max-width:560px; margin:0 auto; padding:84px 22px 96px; position:relative; z-index:2; }
.build h2{ font-family:var(--font-display); font-weight:400; font-size:24px; letter-spacing:0.2em; text-transform:uppercase; }
.build .lead{ font-family:var(--font-quote); font-style:italic; color:var(--n2); font-size:15px; margin:10px 0 30px; }
.fld{ margin-bottom:20px; }
.fld label{ display:block; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--n3); margin-bottom:8px; }
.fld .opt-tag{ color:var(--n4); }
.bfield{ width:100%; font-family:var(--font-body); font-size:15px; color:var(--cream); background:#070707;
  border:1px solid var(--border-strong); border-radius:var(--r-input); padding:12px 13px; outline:none; resize:vertical; }
.bfield:focus{ border-color:var(--saffron); }
.bfield::placeholder{ color:var(--n4); }
.out{ margin-top:26px; padding:18px; border:1px solid var(--hairline); border-radius:var(--r-card); background:#070707; display:none; }
.out.on{ display:block; }
.out .lk{ width:100%; font-family:ui-monospace,monospace; font-size:12px; color:var(--saffron-soft); background:transparent;
  border:1px solid var(--hairline); border-radius:var(--r-input); padding:10px; word-break:break-all; resize:vertical; min-height:64px; }
.outbtns{ display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
.berr{ color:var(--saffron-soft); font-size:13px; min-height:18px; margin-top:6px; }
.foott{ margin-top:36px; font-size:11px; letter-spacing:0.04em; color:var(--n4); line-height:1.6; }
</style>
</head>
<body>
<div id="cursor"></div>
<canvas id="trail"></canvas>
<!-- INK-BLOOM ground (saffron ember): WebGL canvas over a CSS-only fallback, plus a legibility scrim -->
<canvas id="bloom" class="ink-canvas" aria-hidden="true"></canvas>
<div class="ink-fallback" aria-hidden="true"></div>
<div class="bloom-scrim" aria-hidden="true"></div>

<div class="topbar">
  <span class="markk"><img id="markLogo" src="logo.svg" alt="" onerror="if(this.dataset.f){this.style.display='none'}else{this.dataset.f='1';this.src='logo.png'}">MOSUN<span class="dot">·</span>LISTEN</span>
  <button class="iconbtn hidden" id="muteBtn">Sound on</button>
</div>

<div id="pre">
  <img class="logo" id="preLogo" src="logo.svg" alt="" onerror="if(this.dataset.f){this.replaceWith(Object.assign(document.createElement('div'),{className:'wordmark',textContent:'MOSUN'}))}else{this.dataset.f='1';this.src='logo.png'}">
  <div class="count" id="preCount">00</div>
  <div class="lbl">Loading</div>
</div>

<div id="app"></div>

<div id="playhint"><span class="ar">▶</span><span class="t">tap play to start</span></div>
<div id="scrollhint"><span class="t">scroll to begin</span><span class="ar">↓</span></div>
<div class="nowbar" id="nowbar"></div>

<script src="https://cdn.jsdelivr.net/npm/lenis@1.1.13/dist/lenis.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script>
/* ============================================================
   MOSUN listening session — scroll-driven (silviasguotti feel, MOSUN brand).
   Builder (no #s) makes a link; the link (#s=…) runs the scroll journey.
   Submits to the SAME backend as index.html: doGet + URL params, no-cors,
   Song = the attached title → Responses sheet (dashboard keeps working).
   ============================================================ */
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzBHACycNb4bteP8p9jW-894zG0-IGYZzJYsvRJ5koZ8BgwBHkU2UXFUC6VuFQBnnOl/exec';
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]; }); }
var prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
var finePointer = window.matchMedia && window.matchMedia('(pointer:fine)').matches;
var hasGsap = typeof gsap !== 'undefined';
var hasLenis = typeof Lenis !== 'undefined';

/* ---------- hash codec ---------- */
function b64urlEncode(str){ return btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function b64urlDecode(s){ s = s.replace(/-/g,'+').replace(/_/g,'/'); while(s.length % 4) s += '='; return decodeURIComponent(escape(atob(s))); }
function readConfig(){
  var m = (location.hash || '').match(/[#&]s=([^&]+)/);
  if(!m) return null;
  try{ var o = JSON.parse(b64urlDecode(m[1])); return (o && o.t && o.e) ? o : null; }
  catch(e){ return null; }
}
// Accept a full <iframe …> or a bare URL → { src, h } (h = embed's own height, so
// DISCO's transport UI is never clipped). Returns null if no valid https src.
function parseEmbed(raw){
  raw = (raw || '').trim(); if(!raw) return null;
  var m = raw.match(/src\s*=\s*["']([^"']+)["']/i);
  var url = m ? m[1] : raw;
  if(/^\/\//.test(url)) url = 'https:' + url;
  if(!/^https:\/\//i.test(url)) return null;
  var hm = raw.match(/height\s*=\s*["']?(\d+)/i);
  return { src: url, h: hm ? parseInt(hm[1], 10) : 0 };
}
function playerHeight(){ return Math.max(140, Math.min(680, parseInt(cfg.h, 10) || 232)); }

/* =======================================================================

var STEPS = ['reaction', 'hook', 'playlist', 'share', 'weak', 'remember', 'comments', 'name'];
var REQUIRED = ['reaction', 'hook', 'playlist', 'share', 'weak', 'remember'];

function missingRequired(run){
  var out = [];
  for(var i = 0; i < REQUIRED.length; i++){
    var k = REQUIRED[i]; var v = run[k];
    if(k === 'hook'){ if(!(v >= 1 && v <= 5)) out.push(k); }
    else if(v === undefined || v === null || v === '') out.push(k);
  }
  return out;
}
function buildParams(run, songTitle){
  return {
    name: (run.name || '').trim() || 'Anonymous',
    song: songTitle,
    reaction: run.reaction || '',
    hook: (run.hook >= 1 && run.hook <= 5) ? String(run.hook) : '',
    playlist: run.playlist || '',
    share: run.share || '',
    weak: run.weak || '',
    weakWhere: (run.weakWhere || '').trim(),
    remember: run.remember || '',
    comments: (run.comments || '').trim()
  };
}
function progress(idx){ return Math.max(0, Math.min(1, idx / STEPS.length)); }

function tick(freq){ if(!soundOn) return; try{ actx = actx || new (window.AudioContext || window.webkitAudioContext)();
  var o = actx.createOscillator(), g = actx.createGain(); o.type='sine'; o.frequency.value = freq || 440;
  g.gain.setValueAtTime(0.0001, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.06, actx.currentTime+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+0.18); o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime+0.2);
}catch(e){} }

/* ---------- ripple ---------- */

/* ---------- wiring ---------- */
function sectionEl(step){ return document.querySelector('.sec[data-sec="' + step + '"]'); }
function scrollToStep(step){ var el = sectionEl(step); if(!el) return; if(lenis) lenis.scrollTo(el, { offset: 0 }); else el.scrollIntoView({ behavior: prefersReduced ? 'auto' : 'smooth' }); }
function nextStep(step){ var i = STEPS.indexOf(step); return i >= 0 && i < STEPS.length - 1 ? STEPS[i+1] : 'reveal'; }
function advance(step){ clearTimeout(advTimer); advTimer = setTimeout(function(){ scrollToStep(nextStep(step)); }, 620); }

function wireBeats(){
  $('playBtn').addEventListener('click', function(e){ juice(e, 523); startSession(); });

  // reactions
  document.querySelectorAll('[data-react]').forEach(function(el){
    el.addEventListener('click', function(e){ juice(e); run.reaction = el.getAttribute('data-react');
      var sec = el.closest('.sec'); sec.querySelectorAll('.face').forEach(function(f){ f.classList.remove('sel'); }); el.classList.add('sel'); });
  });
  // choices
  document.querySelectorAll('[data-choice]').forEach(function(el){
    el.addEventListener('click', function(e){ var sec = el.closest('.sec'); var step = sec.getAttribute('data-sec'); juice(e); run[step] = el.getAttribute('data-choice');
      sec.querySelectorAll('.opt').forEach(function(o){ o.classList.remove('sel'); }); el.classList.add('sel'); });
  });
  // weak
  document.querySelectorAll('[data-weak]').forEach(function(el){
    el.addEventListener('click', function(e){ var sec = el.closest('.sec'); juice(e); run.weak = el.getAttribute('data-weak');
      sec.querySelectorAll('.opt').forEach(function(o){ o.classList.remove('sel'); }); el.classList.add('sel');
      var ww = sec.querySelector('.wherewrap');
      if(run.weak === 'Some parts'){ ww.classList.remove('hidden'); var t = ww.querySelector('.wherein'); if(t) t.focus(); }
      else { run.weakWhere = ''; } });
  });
  document.querySelectorAll('.wherein').forEach(function(t){ t.addEventListener('input', function(){ run.weakWhere = t.value; }); });
  document.querySelectorAll('.wherenext').forEach(function(el){ el.addEventListener('click', function(e){ var sec = el.closest('.sec'); run.weakWhere = sec.querySelector('.wherein').value; juice(e); scrollToStep('remember'); }); });
  // hook meter
  document.querySelectorAll('[data-meter]').forEach(function(meter){
    var sec = meter.closest('.sec'); var cnum = sec.querySelector('.cnum');
    function set(v, e){ v = Math.max(1, Math.min(5, v)); run.hook = v;
      meter.querySelectorAll('.seg').forEach(function(s){ s.classList.toggle('lit', parseInt(s.getAttribute('data-v'),10) <= v); });
      cnum.textContent = v; cnum.classList.remove('ghost'); if(e) juice(e, 392 + v*40); else { tick(392 + v*40); buzz(12); } }
    meter.querySelectorAll('.seg').forEach(function(s){ s.addEventListener('click', function(e){ set(parseInt(s.getAttribute('data-v'),10), e); }); });
    function fromPoint(cx){ var r = meter.getBoundingClientRect(); return Math.ceil(Math.max(0.001, Math.min(1, (cx - r.left)/r.width)) * 5); }  // left→right, matches the labels
    var dragging = false;
    meter.addEventListener('pointerdown', function(e){ dragging = true; try{ meter.setPointerCapture(e.pointerId); }catch(_){} set(fromPoint(e.clientX)); });
    meter.addEventListener('pointermove', function(e){ if(dragging) set(fromPoint(e.clientX)); });
    meter.addEventListener('pointerup', function(){ dragging = false; });
  });
  // comments / name
  document.querySelectorAll('.skipc').forEach(function(el){ el.addEventListener('click', function(e){ run.comments=''; juice(e); scrollToStep('name'); }); });
  document.querySelectorAll('.nextc').forEach(function(el){ el.addEventListener('click', function(e){ run.comments = el.closest('.sec').querySelector('.commentsin').value; juice(e); scrollToStep('name'); }); });
  document.querySelectorAll('.ghostc').forEach(function(el){ el.addEventListener('click', function(e){ run.name=''; juice(e, 659); finish(); }); });
  document.querySelectorAll('.sendc').forEach(function(el){ el.addEventListener('click', function(e){ run.name = el.closest('.sec').querySelector('.namein').value; juice(e, 659); finish(); }); });

  if(finePointer && !prefersReduced) initMagnetic();
}

/* ---------- start the session ---------- */
var sessionStarted = false;
function startSession(){
  if(sessionStarted) { scrollToStep('player'); return; } sessionStarted = true;
  var frame = document.createElement('div'); frame.className = 'playerframe';
  var fr = document.createElement('iframe');
  fr.setAttribute('src', cfg.e); fr.setAttribute('allow', 'autoplay; encrypted-media; clipboard-write');
  fr.setAttribute('referrerpolicy', 'no-referrer-when-downgrade'); fr.setAttribute('title', cfg.t);
  fr.style.height = playerHeight() + 'px';
  frame.appendChild(fr); $('frHost').appendChild(frame);
  $('nowbar').innerHTML = 'Now playing · <b>' + esc(cfg.t) + '</b>'; $('nowbar').classList.add('on');
  $('muteBtn').classList.remove('hidden');
  document.documentElement.classList.remove('locked'); document.body.classList.remove('locked');
  if(lenis) lenis.start();
  setTimeout(function(){ scrollToStep('player'); }, 400);   // land on the full player, transport visible
  showCues();
}

// Two sequenced nudges after the auto-scroll settles: (1) the player frame pulses +
// "tap play" — drawing the eye to DISCO's play control (we can't reach inside the
// iframe). Then (2) "scroll to begin". Each dismisses on the user's own scroll.
function showCues(){
  var frame = $('frHost') ? $('frHost').querySelector('.playerframe') : null;
  if(frame) frame.classList.add('pulse');
  var play = $('playhint'), scroll = $('scrollhint');
  setTimeout(function(){
    var baseY = window.scrollY, killed = false;
    if(play) play.classList.add('on');
    function dismiss(){ if(killed) return; killed = true; if(play) play.classList.remove('on'); if(frame) frame.classList.remove('pulse'); window.removeEventListener('scroll', onScroll); thenScroll(); }
    function onScroll(){ if(Math.abs(window.scrollY - baseY) > 40) dismiss(); }
    window.addEventListener('scroll', onScroll, { passive: true });
    setTimeout(dismiss, 6500);
  }, 1200);
  function thenScroll(){
    setTimeout(function(){
      if(!scroll) return;
      var ps = document.querySelector('[data-sec="player"]');
      if(ps && Math.abs(ps.getBoundingClientRect().top) > innerHeight * 0.6) return;   // already moved past the player
      var b = window.scrollY, k = false;
      scroll.classList.add('on');
      function d(){ if(k) return; k = true; scroll.classList.remove('on'); window.removeEventListener('scroll', s); }
      function s(){ if(Math.abs(window.scrollY - b) > 40) d(); }
      window.addEventListener('scroll', s, { passive: true });
      setTimeout(d, 6000);
    }, 700);
  }
}

/* ---------- finish / submit ---------- */
function finish(){
  var miss = missingRequired(run);
  if(miss.length){ scrollToStep(miss[0]); return; }
  scrollToStep('reveal');
  tick(784); buzz([12,40,18]);
  submit();
}
function submit(){
  var p = buildParams(run, cfg.t); var usp = new URLSearchParams();
  Object.keys(p).forEach(function(k){ usp.append(k, p[k]); });
  var ss = $('sendState'); if(ss){ ss.textContent = 'Sending…'; ss.className = 'sendstate'; }
  fetch(SCRIPT_URL + '?' + usp.toString(), { mode: 'no-cors' })
    .then(function(){ if(ss){ ss.textContent = 'Received. Thank you — truly.'; ss.className = 'sendstate ok'; } })
    .catch(function(){ if(ss){ ss.innerHTML = 'Couldn’t send — <button class="backlink" id="retryBtn">try again</button>'; ss.className = 'sendstate err'; var rb=$('retryBtn'); if(rb) rb.addEventListener('click', submit); } });
}

/* ---------- magnetic cursor + CTAs ---------- */
var cursor = $('cursor');
function initMagnetic(){
  document.querySelectorAll('.mag').forEach(function(el){
    el.addEventListener('mousemove', function(e){ var r = el.getBoundingClientRect(); var dx = e.clientX - (r.left+r.width/2); var dy = e.clientY - (r.top+r.height/2);
      el.style.transform = 'translate(' + dx*0.25 + 'px,' + dy*0.25 + 'px)'; });

    el.addEventListener('mouseleave', function(){ cursor.classList.remove('grow'); el.style.transform = ''; });
  });

/* ---------- light-trail cursor: long-exposure crimson streaks tracing the motion ---------- */
function initTrail(){
  if(!finePointer || prefersReduced) return;
  var c = $('trail'); if(!c) return; var x = c.getContext('2d');
  function size(){ c.width = innerWidth; c.height = innerHeight; } size(); addEventListener('resize', size);
  var trail = [], LIFE = 1.2, lx = -9999, ly = -9999;
  // ember particles flying around the cursor — pre-rendered saffron glow sprite (cheap to draw)
  var sparks = [], plx = -9999, ply = -9999;
  var spark = document.createElement('canvas'); spark.width = spark.height = 32;
  var sctx = spark.getContext('2d'); var srg = sctx.createRadialGradient(16, 16, 0, 16, 16, 16);
  srg.addColorStop(0, 'rgba(255,216,172,1)'); srg.addColorStop(0.4, 'rgba(246,162,92,0.7)'); srg.addColorStop(1, 'rgba(246,162,92,0)');
  sctx.fillStyle = srg; sctx.fillRect(0, 0, 32, 32);
  // dim, soft sub-beams that fan off the central line (saffron glow only; wide+low-alpha = blurred look).
  // off = lateral base; wob/ph = a gentle weave so they cross like light streaks; a = brightness.
  var SUBS = [
    { off:-8,  wob:5,  ph:0.4, a:0.06 }, { off: 8,  wob:6,  ph:1.9, a:0.055 },
    { off:-17, wob:9,  ph:3.4, a:0.035 }, { off: 17, wob:8,  ph:5.0, a:0.03 },
    { off:-28, wob:13, ph:2.4, a:0.018 }, { off: 28, wob:12, ph:4.3, a:0.016 }
  ];
  // central beam, kept well below the sun: saffron soft-glow → glow → soft warm (not white-hot) core.
  var MAINP = [ { col:'246,162,92', w:8, a:0.035 }, { col:'246,162,92', w:4.5, a:0.09 }, { col:'255,208,158', w:2.4, a:0.17 } ];
  function seg(px, py, i, j){                            // smooth quadratic through segment midpoints
    x.beginPath();
    x.moveTo((px[i-1]+px[i])/2, (py[i-1]+py[i])/2);
    x.quadraticCurveTo(px[i], py[i], (px[i]+px[j])/2, (py[i]+py[j])/2);
    x.stroke();
  }
  function frame(ts){
    var t = ts / 1000;
    if(pointer.active && pointer.x > -9000){
      var mdx = pointer.x - lx, mdy = pointer.y - ly;
      if(mdx*mdx + mdy*mdy > 2){ trail.push({ x: pointer.x, y: pointer.y, t: t }); lx = pointer.x; ly = pointer.y; }
    }
    while(trail.length && t - trail[0].t > LIFE) trail.shift();
    if(trail.length > 170) trail.splice(0, trail.length - 170);
    x.clearRect(0, 0, c.width, c.height);
    x.globalCompositeOperation = 'lighter'; x.lineCap = 'round'; x.lineJoin = 'round';
    var n = trail.length;
    if(n > 2){
      // smoothed per-point normals (averaged from neighbours) so beam offsets follow the curve
      var nx = [], ny = [];
      for(var i = 0; i < n; i++){
        var a = trail[i > 0 ? i-1 : 0], b = trail[i < n-1 ? i+1 : n-1];
        var dx = b.x - a.x, dy = b.y - a.y, l = Math.sqrt(dx*dx + dy*dy) || 1;
        nx[i] = -dy/l; ny[i] = dx/l;
      }
      // sub-beams first (behind) — offset grows toward the head so they branch out from the centre
      x.strokeStyle = 'rgba(246,162,92,1)';
      for(var si = 0; si < SUBS.length; si++){
        var sb = SUBS[si], px = [], py = [];
        for(var i = 0; i < n; i++){
          var f = i / n, o = (sb.off + sb.wob * Math.sin(i*0.16 + sb.ph)) * (0.3 + 0.8*f);
          px[i] = trail[i].x + nx[i]*o; py[i] = trail[i].y + ny[i]*o;
        }
        for(var pass = 0; pass < 2; pass++){
          var pw = pass === 0 ? 9 : 19, pa = pass === 0 ? 0.5 : 0.26;   // two wide soft passes = blur
          for(var i = 1; i < n; i++){
            var f = i / n, bright = f * (1 - (t - trail[i].t)/LIFE); if(bright <= 0) continue;
            x.globalAlpha = sb.a * pa * bright; x.lineWidth = pw * (0.5 + 0.7*f);
            seg(px, py, i, i < n-1 ? i+1 : i);
          }
        }
      }
      // bright, sharp central beam on top (offset 0 — straight down the trail)
      var mx = [], my = [];
      for(var i = 0; i < n; i++){ mx[i] = trail[i].x; my[i] = trail[i].y; }
      for(var pass = 0; pass < MAINP.length; pass++){
        var ps = MAINP[pass]; x.strokeStyle = 'rgba(' + ps.col + ',1)';
        for(var i = 1; i < n; i++){
          var f = i / n, bright = f * (1 - (t - trail[i].t)/LIFE); if(bright <= 0) continue;
          x.globalAlpha = ps.a * bright; x.lineWidth = ps.w * (0.5 + 0.7*f);
          seg(mx, my, i, i < n-1 ? i+1 : i);
        }
      }
    }
    if(pointer.active && pointer.x > -9000){              // bright head spark
      var g = x.createRadialGradient(pointer.x, pointer.y, 0, pointer.x, pointer.y, 16);
      g.addColorStop(0, 'rgba(255,216,172,0.15)'); g.addColorStop(0.32, 'rgba(246,162,92,0.09)'); g.addColorStop(1, 'rgba(246,162,92,0)');
      x.globalAlpha = 1; x.fillStyle = g; x.beginPath(); x.arc(pointer.x, pointer.y, 20, 0, Math.PI*2); x.fill();
    }
    // ---- ember particles flying around the cursor ----
    if(pointer.active && pointer.x > -9000){
      var cvx = plx > -9000 ? pointer.x - plx : 0, cvy = ply > -9000 ? pointer.y - ply : 0;
      plx = pointer.x; ply = pointer.y;
      for(var e = 0; e < 5; e++){
        var ang = Math.random() * Math.PI * 2, sp = 0.3 + Math.random() * 1.2;
        sparks.push({ x: pointer.x + (Math.random()-0.5)*14, y: pointer.y + (Math.random()-0.5)*14,
          vx: Math.cos(ang)*sp + cvx*0.25, vy: Math.sin(ang)*sp + cvy*0.25, life: 1, r: 0.7 + Math.random()*1.7 });
      }
      if(sparks.length > 220) sparks.splice(0, sparks.length - 220);
    }
    for(var si2 = sparks.length - 1; si2 >= 0; si2--){
      var s = sparks[si2];
      s.vy -= 0.012; s.vx *= 0.95; s.vy *= 0.96;       // embers rise + drag
      s.x += s.vx; s.y += s.vy; s.life -= 0.018;
      if(s.life <= 0){ sparks.splice(si2, 1); continue; }
      var dd = s.r * 6; x.globalAlpha = s.life * s.life * 0.18;   // fade out, kept well below the sun
      x.drawImage(spark, s.x - dd/2, s.y - dd/2, dd, dd);
    }
    x.globalAlpha = 1; x.globalCompositeOperation = 'source-over';
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
function initCursor(){
  if(!finePointer || prefersReduced) return;
  var qx = hasGsap ? gsap.quickTo(cursor, 'x', { duration:0.25, ease:'power3' }) : null;
  var qy = hasGsap ? gsap.quickTo(cursor, 'y', { duration:0.25, ease:'power3' }) : null;
  addEventListener('mousemove', function(e){ cursor.classList.add('show'); if(qx){ qx(e.clientX); qy(e.clientY); } else { cursor.style.left = e.clientX+'px'; cursor.style.top = e.clientY+'px'; } });
}

/* ---------- reveals ---------- */
function initReveals(){
  if(!hasGsap || prefersReduced) return;
  gsap.registerPlugin(ScrollTrigger);
  document.querySelectorAll('.sec').forEach(function(sec){
    var chars = sec.querySelectorAll('.htitle .char');
    var els = sec.querySelectorAll('.reveal-el');
    // signature scatter-to-assemble: letters rise + un-rotate into place
    if(chars.length) gsap.from(chars, { yPercent:150, opacity:0, rotate:function(){ return gsap.utils.random(-14, 14); },
      duration:0.85, ease:'power3.out', stagger:0.022, scrollTrigger:{ trigger:sec, start:'top 80%' } });
    if(els.length) gsap.from(els, { y:26, opacity:0, duration:0.9, ease:'power3.out', stagger:0.08, delay:0.05,
      scrollTrigger:{ trigger:sec, start:'top 80%' } });
    // gentle parallax depth as the section travels through the viewport
    var inner = sec.querySelector('.sec-in');
    if(inner) gsap.fromTo(inner, { yPercent:6 }, { yPercent:-6, ease:'none', scrollTrigger:{ trigger:sec, start:'top bottom', end:'bottom top', scrub:1 } });
  });
  // reveal section fires the submit when reached (covers free-scroll)
  var rev = document.querySelector('.sec[data-sec="reveal"]');
  if(rev) ScrollTrigger.create({ trigger:rev, start:'top 60%', onEnter:function(){ if(!missingRequired(run).length && $('sendState') && !$('sendState').textContent) finish(); } });
}

/* ---------- smooth scroll ---------- */
var lenis = null;
function initLenis(){
  if(!hasLenis || prefersReduced || !finePointer) return;
  lenis = new Lenis({ duration:1.15, easing:function(t){ return Math.min(1, 1.001 - Math.pow(2, -10*t)); } });
  lenis.on('scroll', function(){ if(hasGsap) ScrollTrigger.update(); });
  if(hasGsap){ gsap.ticker.add(function(t){ lenis.raf(t*1000); }); gsap.ticker.lagSmoothing(0); }
  else { (function raf(time){ lenis.raf(time); requestAnimationFrame(raf); })(); }
  lenis.stop();   // locked until press play
}

/* ---------- preloader ---------- */
function runPreloader(done){
  var el = $('preCount'); var start = null, dur = 1500;
  function frame(ts){ if(start === null) start = ts; var p = Math.min(1, (ts-start)/dur); var eased = 1 - Math.pow(1-p, 3);
    el.textContent = String(Math.round(eased*100)).padStart(2,'0'); if(p < 1) requestAnimationFrame(frame);
    else setTimeout(function(){ $('pre').classList.add('gone'); setTimeout(done, 700); }, 250); }
  requestAnimationFrame(frame);
}

/* ---------- mute ---------- */
$('muteBtn').addEventListener('click', function(){ soundOn = !soundOn; localStorage.setItem('mosun_listen_sound', soundOn ? 'on' : 'off'); updateMute(); if(soundOn) tick(523); });

      '<p class="foott">This page is unlisted. Each link carries its song in the URL — long and unguessable. Feedback lands in your Responses sheet tagged with the title, so the dashboard keeps working.</p>' +

    $('bLink').value = link; $('bOut').classList.add('on');
    $('bCopy').onclick = function(){ if(navigator.clipboard) navigator.clipboard.writeText(link); $('bCopy').textContent = 'Copied ✓'; setTimeout(function(){ $('bCopy').textContent = 'Copy link'; }, 1600); };
    $('bPreview').onclick = function(){ location.hash = 's=' + enc; location.reload(); };
  });
}

/* ============================================================================
   INK-BLOOM MODULE (reusable) — raw-WebGL saffron ember background.
   initInkBloom(canvas, options) -> { mode, status(), set(partial), destroy() }
   fbm + domain warp, drifting glowing core, oxblood + restrained violet depth,
   filament tendrils, animated grain. Downscaled buffer, 30fps cap, pauses when
   hidden/off-screen, WebGL feature-detect, one static frame under reduced-motion.
   ========================================================================== */
function initInkBloom(canvas, options) {
  options = options || {};
  var opts = {
    intensity:     options.intensity     != null ? options.intensity     : 1.0,
    violet:        options.violet         != null ? options.violet        : 0.18,
    speed:         options.speed          != null ? options.speed         : 1.0,
    maxResolution: options.maxResolution  || 1280,
    fps:           options.fps            || 30,
    renderScale:   options.renderScale    || 0.65,
    mode:          options.mode           || 'auto',
    still:         !!options.still
  };
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) opts.still = true;

  var gl = null;
  if (opts.mode !== 'css') {
    try { gl = canvas.getContext('webgl', { antialias:false, alpha:false, depth:false, stencil:false, preserveDrawingBuffer:false, powerPreference:'low-power' }) || canvas.getContext('experimental-webgl'); }
    catch (e) { gl = null; }
  }
  function cssHandle() { canvas.style.display = 'none'; return { mode:'css', status:function(){ return 'css'; }, set:function(){}, destroy:function(){ canvas.style.display=''; } }; }
  if (!gl) return cssHandle();

  var VERT = 'attribute vec2 a_pos; void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }';
  var FRAG = [
    '#ifdef GL_FRAGMENT_PRECISION_HIGH', 'precision highp float;', '#else', 'precision mediump float;', '#endif',
    'uniform vec2 u_res; uniform float u_time; uniform float u_intensity; uniform float u_violet; uniform vec2 u_mouse; uniform float u_mouseOn;',
    'float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453123); }',
    'float vnoise(vec2 p){ vec2 i=floor(p), f=fract(p);',
    '  float a=hash(i), b=hash(i+vec2(1.,0.)), c=hash(i+vec2(0.,1.)), d=hash(i+vec2(1.,1.));',
    '  vec2 u=f*f*(3.-2.*f); return mix(mix(a,b,u.x), mix(c,d,u.x), u.y); }',
    'float fbm(vec2 p){ float v=0., a=0.5; mat2 m=mat2(1.6,1.2,-1.2,1.6);',
    '  for(int i=0;i<5;i++){ v+=a*vnoise(p); p=m*p; a*=0.5; } return v; }',
    'void main(){',
    '  vec2 uv=(gl_FragCoord.xy-0.5*u_res)/u_res.y; float t=u_time;',
    '  vec2 ctr=vec2(sin(t*0.05)*0.05, cos(t*0.043)*0.045); vec2 p=uv-ctr;',
    '  vec2 toM=uv-u_mouse; float md=dot(toM,toM); p += normalize(toM+vec2(1e-4))*(u_mouseOn*exp(-md*22.0)*0.075);',   // cursor pushes the ink/flames
    '  vec2 q=vec2(fbm(p*1.6 + t*0.03), fbm(p*1.6 + vec2(5.2,1.3) - t*0.025));',
    '  vec2 r=vec2(fbm(p*1.6 + 1.2*q + vec2(1.7,9.2) + t*0.02), fbm(p*1.6 + 1.2*q + vec2(8.3,2.8) - t*0.018));',
    '  float f=fbm(p*1.6 + 1.6*r); float rad=length(p); float d=rad*(0.82+0.55*f) - 0.10*r.x;',
    '  vec3 hot=vec3(1.000,0.965,0.910); vec3 saff=vec3(0.965,0.635,0.360); vec3 amber=vec3(0.847,0.510,0.227);',
    '  vec3 oxb=vec3(0.494,0.004,0.004); vec3 viol=vec3(0.231,0.082,0.188); vec3 ink=vec3(0.0);',
    '  vec3 col=hot;',
    '  col=mix(col, saff,  smoothstep(0.02,0.16,d));',
    '  col=mix(col, amber, smoothstep(0.12,0.30,d));',
    '  col=mix(col, oxb,   smoothstep(0.26,0.52,d));',
    '  vec3 outer=mix(oxb, viol, clamp(u_violet,0.0,1.0));',
    '  col=mix(col, outer, smoothstep(0.46,0.72,d)*0.85);',
    '  col=mix(col, ink,   smoothstep(0.64,1.05,d));',
    '  float ridge=1.0-abs(fbm(p*5.5 + r*2.4 + t*0.04)*2.0-1.0); ridge=pow(clamp(ridge,0.0,1.0), 3.5);',
    '  float filMask=smoothstep(0.05,0.22,rad)*(1.0-smoothstep(0.42,0.85,rad)); col+=saff*ridge*filMask*0.35;',
    '  float waves=0.5+0.5*sin(rad*34.0 - t*0.45 + f*4.0); col+=saff*waves*(1.0-smoothstep(0.12,0.5,rad))*0.05;',
    '  float core=exp(-rad*rad*14.0); float halo=exp(-rad*2.6); col+=hot*core*1.5 + saff*halo*0.5;',
    '  col += saff*(u_mouseOn*exp(-md*30.0)*0.012);',   // faint warmth where the cursor stirs the ember (well below sun)
    '  col*=u_intensity; col*=(1.0-smoothstep(0.25,1.15,rad));',
    '  float g=hash(gl_FragCoord.xy*0.7 + fract(t)*vec2(13.1,7.7)); col+=(g-0.5)*0.05;',
    '  gl_FragColor=vec4(max(col,0.0),1.0);',
    '}'
  ].join('\n');

  function sh(type, src) { var s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { if (window.console) console.warn('ink-bloom shader:', gl.getShaderInfoLog(s)); gl.deleteShader(s); return null; } return s; }
  var vs = sh(gl.VERTEX_SHADER, VERT), fs = sh(gl.FRAGMENT_SHADER, FRAG);
  if (!vs || !fs) return cssHandle();
  var prog = gl.createProgram(); gl.attachShader(prog, vs); gl.attachShader(prog, fs); gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) { if (window.console) console.warn('ink-bloom link:', gl.getProgramInfoLog(prog)); return cssHandle(); }
  gl.useProgram(prog);

  var qbuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, qbuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos'); gl.enableVertexAttribArray(aPos); gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
  var uRes = gl.getUniformLocation(prog, 'u_res'), uTime = gl.getUniformLocation(prog, 'u_time'),
      uInt = gl.getUniformLocation(prog, 'u_intensity'), uVio = gl.getUniformLocation(prog, 'u_violet'),
      uMouse = gl.getUniformLocation(prog, 'u_mouse'), uMouseOn = gl.getUniformLocation(prog, 'u_mouseOn');
  gl.uniform1f(uInt, opts.intensity); gl.uniform1f(uVio, opts.violet);

  // pointer interaction — the cursor pushes the ink/flames (smoothed; disabled on touch)
  var mx = 0, my = 0, tmx = 0, tmy = 0, mOn = 0, tmOn = 0, cssWv = 1, cssHv = 1, moved = false;
  var finePtr = !(window.matchMedia && window.matchMedia('(pointer:coarse)').matches);
  function onMove(e) { tmx = e.clientX; tmy = e.clientY; if (!moved) { mx = tmx; my = tmy; moved = true; } if (finePtr) tmOn = 1; }
  function onLeaveDoc() { tmOn = 0; }
  window.addEventListener('pointermove', onMove, { passive: true });
  window.addEventListener('pointerdown', onMove, { passive: true });
  document.addEventListener('mouseleave', onLeaveDoc, { passive: true });
  window.addEventListener('blur', onLeaveDoc);

  function resize() {
    var rect = canvas.getBoundingClientRect();
    var cssW = Math.max(1, rect.width), cssH = Math.max(1, rect.height);
    cssWv = cssW; cssHv = cssH;
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var w = cssW * dpr * opts.renderScale, h = cssH * dpr * opts.renderScale;
    var le = Math.max(w, h); if (le > opts.maxResolution) { var k = opts.maxResolution / le; w *= k; h *= k; }
    w = Math.max(2, Math.floor(w)); h = Math.max(2, Math.floor(h));
    if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; }
    gl.viewport(0, 0, canvas.width, canvas.height); gl.uniform2f(uRes, canvas.width, canvas.height);
  }
  var raf = 0, last = -1e9, t0 = null, interval = 1000 / opts.fps, visible = true, onscreen = true, destroyed = false;
  function draw(ts) {
    if (t0 === null) t0 = ts;
    mx += (tmx - mx) * 0.18; my += (tmy - my) * 0.18; mOn += (tmOn - mOn) * 0.08;   // smooth follow
    gl.uniform2f(uMouse, (mx - 0.5 * cssWv) / cssHv, (0.5 * cssHv - my) / cssHv);    // CSS px → shader uv (y flipped)
    gl.uniform1f(uMouseOn, mOn);
    gl.uniform1f(uTime, ((ts - t0) / 1000) * opts.speed);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }
  function renderStill() { gl.uniform1f(uMouseOn, 0.0); gl.uniform1f(uTime, 6.0 * opts.speed); gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4); }
  function loop(ts) { if (destroyed) return; raf = requestAnimationFrame(loop); if (ts - last < interval) return; last = ts; draw(ts); }
  function start() { if (destroyed || opts.still) return; if (!raf) { last = -1e9; raf = requestAnimationFrame(loop); } }
  function stop() { if (raf) { cancelAnimationFrame(raf); raf = 0; } }
  function sync() { if (visible && onscreen) start(); else stop(); }
  function onVis() { visible = !document.hidden; sync(); }
  function onWinResize() { resize(); if (opts.still) renderStill(); }
  function onLost(e) { e.preventDefault(); stop(); canvas.style.display = 'none'; }
  document.addEventListener('visibilitychange', onVis);
  canvas.addEventListener('webglcontextlost', onLost, false);
  var io = null, ro = null;
  if ('IntersectionObserver' in window) { io = new IntersectionObserver(function (es) { onscreen = es[0].isIntersecting; sync(); }, { threshold: 0 }); io.observe(canvas); }
  if ('ResizeObserver' in window) { ro = new ResizeObserver(function () { resize(); if (opts.still) renderStill(); }); ro.observe(canvas); }
  else window.addEventListener('resize', onWinResize);
  resize();
  if (opts.still) renderStill(); else sync();

  return {
    mode: opts.still ? 'still' : 'webgl',
    status: function () { return destroyed ? 'destroyed' : (opts.still ? 'still' : (raf ? 'running' : 'paused')); },
    set: function (o) {
      if (!o) return;
      if (o.intensity != null) { opts.intensity = o.intensity; gl.uniform1f(uInt, opts.intensity); }
      if (o.violet    != null) { opts.violet    = o.violet;    gl.uniform1f(uVio, opts.violet); }
      if (o.speed     != null) opts.speed = o.speed;
      if (opts.still) renderStill();   // reflect new values in the frozen frame
    },
    destroy: function () {
      destroyed = true; stop();
      document.removeEventListener('visibilitychange', onVis);
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerdown', onMove);
      document.removeEventListener('mouseleave', onLeaveDoc);
      window.removeEventListener('blur', onLeaveDoc);
      canvas.removeEventListener('webglcontextlost', onLost);
      if (io) io.disconnect();
      if (ro) ro.disconnect(); else window.removeEventListener('resize', onWinResize);
      var lose = gl.getExtension('WEBGL_lose_context'); if (lose) lose.loseContext();
      canvas.style.display = '';
    }
  };
}

/* ---------- boot ---------- */
updateMute();
initCursor();
initTrail();
// ink-bloom ground for every mode (builder + runner). ?mode=css / ?still=1 force the fallback paths.
var _ip = new URLSearchParams(location.search);
bloom = initInkBloom($('bloom'), {
  mode:  _ip.get('mode') === 'css' ? 'css' : 'auto',
  still: _ip.get('still') === '1',
  intensity: 1.0, violet: 0.18, speed: 1.0, maxResolution: 1280, fps: 30   // exact ink-bloom demo look
});
document.documentElement.classList.toggle('ink-live', bloom.mode === 'webgl' || bloom.mode === 'still');
cfg = readConfig();
if(cfg){
  buildFan();
  initLenis();
  initReveals();
  document.documentElement.classList.add('locked'); document.body.classList.add('locked');  // lock until play
  runPreloader(function(){ /* title revealed; scroll stays locked until Press play */ });
} else {
  renderBuilder();
}
</script>
