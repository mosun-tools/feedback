<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>MOSUN — Self-Filter</title>
<link rel="stylesheet" href="theme.css">
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ background:var(--ink); color:var(--cream); }
body{ font-family:var(--font-body); line-height:1.5; -webkit-font-smoothing:antialiased; min-height:100vh; }
::selection{ background:var(--saffron); color:var(--ink); }
body::before{ content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:radial-gradient(ellipse 90% 60% at 70% -10%, rgba(246,162,92,0.08), transparent 60%),
             radial-gradient(ellipse 70% 50% at 10% 115%, rgba(126,1,1,0.10), transparent 60%); }
.wrap{ position:relative; z-index:1; max-width:760px; margin:0 auto; padding:52px 28px 120px; }
.hidden{ display:none !important; }

/* gate */
#gate{ position:fixed; inset:0; z-index:100; background:var(--ink); display:flex; align-items:center; justify-content:center; padding:24px; }
.gate-card{ width:100%; max-width:380px; text-align:center; }
.gate-card h2{ font-family:var(--font-display); font-weight:400; font-size:24px; letter-spacing:0.22em; text-transform:uppercase; }
.gate-card .lead{ font-family:var(--font-quote); font-style:italic; color:var(--n2); font-size:15px; margin:12px 0 28px; }
.gate-card input{ width:100%; font-family:var(--font-body); font-size:15px; padding:13px 14px; text-align:center; color:var(--cream);
  background:transparent; border:1px solid var(--border-strong); border-radius:var(--r-input); outline:none; }
.gate-card input:focus{ border-color:var(--saffron); }
.gate-card .err{ color:var(--saffron-soft); font-size:13px; min-height:18px; margin-top:12px; }

/* buttons / pills */
.btn{ font-family:var(--font-body); font-size:12px; letter-spacing:0.18em; text-transform:uppercase; padding:13px 26px;
  border-radius:var(--r-pill); border:1px solid var(--border-strong); background:transparent; color:var(--cream); cursor:pointer;
  transition:border-color .9s var(--ease), background .9s var(--ease), color .9s var(--ease), box-shadow .9s var(--ease); }
.btn:hover{ border-color:var(--saffron); box-shadow:0 0 0 1px var(--saffron), 0 0 32px -6px var(--saffron); }
.btn.primary{ background:var(--saffron); color:var(--ink); border-color:var(--saffron); }
.btn.primary:hover{ background:var(--saffron-hover); border-color:var(--saffron-hover); box-shadow:0 0 40px -6px var(--saffron); }
.btn.small{ padding:9px 16px; }
.btn:disabled{ opacity:.4; cursor:not-allowed; box-shadow:none; }

/* header */
header{ display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:36px; }
.brand h1{ font-family:var(--font-display); font-weight:400; font-size:26px; letter-spacing:0.24em; text-transform:uppercase; line-height:1; }
.brand .sub{ margin-top:10px; font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--n3); }
.dot{ color:var(--saffron); }
.msg{ font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:var(--n3); min-height:16px; }
.msg.ok{ color:var(--saffron); } .msg.err{ color:var(--saffron-soft); }

/* stage / flow */
.stage{ min-height:340px; display:flex; flex-direction:column; justify-content:center; transition:opacity .5s var(--ease), transform .6s var(--ease); }
.stage.leaving{ opacity:0; transform:translateY(-10px) scale(0.99); }
.stage.entering{ opacity:0; transform:translateY(12px) scale(0.99); }
.kicker{ font-size:11px; letter-spacing:0.28em; text-transform:uppercase; color:var(--saffron); margin-bottom:18px; }
.kicker.gate-k{ color:var(--saffron); }
.qtitle{ font-family:var(--font-display); font-weight:400; text-transform:uppercase; letter-spacing:0.06em; line-height:1.05;
  font-size:clamp(30px,6.5vw,52px); margin-bottom:18px; }
.qtitle .ch{ display:inline-block; opacity:0; transform:translateY(8px); transition:opacity .9s var(--ease), transform .9s var(--ease); }
.stage.in .qtitle .ch{ opacity:1; transform:none; }
.qprompt{ font-size:16px; color:var(--n2); max-width:600px; margin-bottom:32px; }
.subs{ list-style:none; margin:0 0 32px; max-width:600px; }
.subs li{ font-size:14px; color:var(--n3); padding:6px 0 6px 18px; position:relative; opacity:0; transform:translateY(6px);
  transition:opacity 1.1s var(--ease), transform 1.1s var(--ease); }
.stage.in .subs li{ opacity:1; transform:none; }
.subs li::before{ content:'·'; position:absolute; left:2px; color:var(--saffron); }

/* gate choices */
.choices{ display:flex; gap:16px; flex-wrap:wrap; }
.choice{ flex:1; min-width:180px; font-family:var(--font-display); font-weight:400; letter-spacing:0.16em; text-transform:uppercase;
  font-size:22px; padding:34px 20px; border:1px solid var(--border-strong); border-radius:var(--r-card); background:#070707;
  color:var(--cream); cursor:pointer; transition:border-color .6s var(--ease), background .6s var(--ease), box-shadow .9s var(--ease), transform .6s var(--ease); }
.choice .hint{ display:block; font-family:var(--font-body); font-size:10px; letter-spacing:0.18em; color:var(--n3); margin-top:10px; }
.choice.pass:hover, .choice.pass.sel{ border-color:var(--saffron); box-shadow:0 0 0 1px var(--saffron), 0 0 44px -8px var(--saffron); transform:translateY(-2px); }
.choice.fail:hover, .choice.fail.sel{ border-color:var(--oxblood); box-shadow:0 0 0 1px var(--oxblood); }

/* score selector */
.scorerow{ display:flex; gap:12px; flex-wrap:wrap; }
.score{ width:74px; height:74px; border-radius:var(--r-card); border:1px solid var(--border-strong); background:#070707;
  color:var(--cream); font-family:var(--font-display); font-size:26px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:border-color .5s var(--ease), background .5s var(--ease), color .5s var(--ease), box-shadow .8s var(--ease), transform .5s var(--ease); }
.score .k{ position:absolute; }
.score:hover, .score.sel{ border-color:var(--saffron); transform:translateY(-2px); box-shadow:0 0 0 1px var(--saffron), 0 0 36px -8px var(--saffron); }
.score.sel{ background:var(--saffron); color:var(--ink); }
.scorelab{ display:flex; justify-content:space-between; max-width:430px; margin-top:10px; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--n4); }

/* progress + nav */
.flowfoot{ display:flex; align-items:center; justify-content:space-between; gap:16px; margin-top:40px; flex-wrap:wrap; }
.dots{ display:flex; gap:9px; }
.dots .d{ width:8px; height:8px; border-radius:50%; background:var(--n5); transition:background .6s var(--ease), box-shadow .6s var(--ease); }
.dots .d.done{ background:var(--n2); }
.dots .d.now{ background:var(--saffron); box-shadow:0 0 10px var(--saffron); }
.dots .d.fail{ background:var(--oxblood); }
.navhint{ font-size:11px; letter-spacing:0.06em; color:var(--n4); }
.navhint kbd{ border:1px solid var(--hairline); border-radius:4px; padding:1px 5px; color:var(--n2); }
.backlink{ font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--n3); background:none; border:none; cursor:pointer; }
.backlink:hover{ color:var(--saffron); }

/* start screen */
.start-in{ width:100%; max-width:520px; font-family:var(--font-display); font-weight:400; font-size:28px; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--cream); background:transparent; border:none; border-bottom:1px solid var(--border-strong); padding:14px 2px; outline:none; }
.start-in:focus{ border-color:var(--saffron); }
.start-in::placeholder{ color:var(--n4); }

/* reveal */
.reveal{ text-align:center; position:relative; }
.bigscore{ font-family:var(--font-display); font-weight:400; font-size:clamp(80px,18vw,150px); line-height:1; letter-spacing:0.02em; }
.bigscore .of{ font-size:24px; color:var(--n3); letter-spacing:0.2em; }
.verdict{ font-family:var(--font-display); font-weight:400; letter-spacing:0.22em; text-transform:uppercase; font-size:clamp(26px,6vw,40px); margin-top:20px; }
.verdict.ready{ color:var(--saffron); }
.verdict.notready{ color:var(--n2); }
.verdict.notready .nr{ color:var(--oxblood); }
.bloom{ position:absolute; left:50%; top:38%; width:520px; height:520px; transform:translate(-50%,-50%) scale(.4); border-radius:50%;
  background:radial-gradient(circle, rgba(246,162,92,0.22), transparent 62%); opacity:0; pointer-events:none;
  transition:opacity 1.4s var(--ease), transform 1.6s var(--ease); }
.bloom.on{ opacity:1; transform:translate(-50%,-50%) scale(1); }
.dimgrid{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:26px 0 8px; }
.dimchip{ font-size:11px; letter-spacing:0.08em; color:var(--n2); border:1px solid var(--hairline); border-radius:var(--r-pill); padding:5px 12px; }
.dimchip b{ color:var(--saffron); font-weight:400; }
.gatechips{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:8px; }
.gatechip{ font-size:10px; letter-spacing:0.12em; text-transform:uppercase; border-radius:var(--r-pill); padding:4px 11px; border:1px solid var(--hairline); color:var(--n3); }
.gatechip.pass{ color:var(--saffron); border-color:rgba(246,162,92,.4); }
.gatechip.fail{ color:var(--oxblood); border-color:rgba(126,1,1,.6); }
.notefield{ width:100%; max-width:520px; margin:24px auto 0; display:block; font-family:var(--font-body); font-size:14px; color:var(--cream);
  background:transparent; border:1px solid var(--border-strong); border-radius:var(--r-input); padding:11px 13px; outline:none; resize:vertical; }
.notefield:focus{ border-color:var(--saffron); }
.revealbtns{ display:flex; gap:12px; justify-content:center; margin-top:28px; flex-wrap:wrap; }

/* library */
.label{ font-size:11px; letter-spacing:0.24em; text-transform:uppercase; color:var(--n3); margin:56px 0 16px; }
.lib{ display:flex; flex-direction:column; gap:10px; }
.libitem{ display:flex; align-items:center; gap:14px; border:1px solid var(--hairline); border-radius:var(--r-card); padding:13px 16px; cursor:pointer;
  transition:border-color .8s var(--ease), box-shadow .8s var(--ease); background:#070707; }
.libitem:hover{ border-color:var(--border-strong); box-shadow:0 0 30px -18px var(--saffron); }
.libitem .lname{ flex:1; font-size:15px; color:var(--cream); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.libitem .lscore{ font-family:var(--font-display); font-size:18px; color:var(--cream); font-variant-numeric:tabular-nums; }
.libitem .lstat{ font-size:10px; letter-spacing:0.14em; text-transform:uppercase; padding:3px 9px; border-radius:var(--r-pill); border:1px solid var(--hairline); }
.libitem .lstat.ready{ color:var(--saffron); border-color:rgba(246,162,92,.4); }
.libitem .lstat.notready{ color:var(--oxblood); border-color:rgba(126,1,1,.55); }
.libempty{ color:var(--n4); font-family:var(--font-quote); font-style:italic; font-size:16px; }
.foot{ margin-top:40px; font-size:11px; letter-spacing:0.04em; color:var(--n4); }
.foot a{ color:var(--saffron); text-decoration:none; }

@media (prefers-reduced-motion: reduce){
  *{ transition:none !important; }
  .stage .qtitle .ch, .stage .subs li{ opacity:1 !important; transform:none !important; }
}
</style>
</head>
<body>

<div id="gate">
  <div class="gate-card">
    <h2>MOSUN SELF-FILTER</h2>
    <p class="lead">Rate your own — through your real filter.</p>
    <input id="gatePass" type="password" placeholder="Passphrase" autocomplete="current-password">
    <button class="btn primary" id="gateBtn" style="width:100%; margin-top:12px;">Enter</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<div class="wrap hidden" id="app">
  <header>
    <div class="brand">
      <h1>SELF<span class="dot">·</span>FILTER</h1>
      <div class="sub">Gates &amp; score &middot; ready / not</div>
    </div>
    <div class="msg" id="msg"></div>
  </header>

  <div class="stage" id="stage"></div>

  <div class="label">Rated</div>
  <div class="lib" id="lib"><div class="libempty">Loading…</div></div>

  <div class="foot">Feeds the <a id="dashLink" href="dashboard-k7m2x9.html" target="_blank" rel="noopener">A&amp;R dashboard</a> — the single source of truth for self-ratings. Gates are non-negotiable; the score is your read.</div>
</div>

<script>
/* ===== shared backend + auth (same store the dashboard reads) ===== */
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzBHACycNb4bteP8p9jW-894zG0-IGYZzJYsvRJ5koZ8BgwBHkU2UXFUC6VuFQBnnOl/exec';
var LOCK = { "s": "S45NEMBGdVpQEt+HaQkxkg==", "i": "Jchnqw2o94hSlZrk", "c": "sl1TtRzcfOdFJ9lu5t7DytLCDesClEOabVuvW6zeyEn/mNryrg==" };
var READ_TOKEN = null;
function $(id){ return document.getElementById(id); }

/* ===== the locked filter (UI text) ===== */
var GATES = [
  { key:'body',       title:'Body moment', q:'A spot that gives goosebumps, a tear, or makes you bop — every time?' },
  { key:'message',    title:'Core message', q:'Can you say what it’s about in one sentence? Does it say something?' },
  { key:'honesty',    title:'Honesty', q:'Does it come from something real — not a performance of the idea?' },
  { key:'conviction', title:'Conviction', q:'Would you still put your name on it in five years?' },
];
var SCORES = [
  { key:'vision',   title:'Vision', subs:['Can you see its world — video, cover, color?','Do you know why it exists?'] },
  { key:'onlyMe',   title:'Only-me', subs:['Could only you have made it? Where’s the fingerprint?','Strip your name off — would someone still know it’s yours?','One choice no one else would make?'] },
  { key:'message',  title:'Message &amp; lyric', subs:['Does the lyric say something true, or just rhyme?','A line someone would screenshot?','Does the production serve the message?'] },
  { key:'brandFit', title:'Brand &amp; visual fit', subs:['Does it live in the MOSUN world — after-dark, cinematic?','Does it move the album story forward?','Does it fit where you’re going?'] },
  { key:'replay',   title:'Replay / pull', subs:['Want to replay it instantly? Hum it unprompted?','Could you perform it (falsetto, swell)?'] },
];

/* =======================================================================
   PURE-LOGIC-START — no DOM. Mirrored by test/rate.test.mjs.
   ======================================================================= */
var GATE_KEYS = ['body', 'message', 'honesty', 'conviction'];
var SCORE_KEYS = ['vision', 'onlyMe', 'message', 'brandFit', 'replay'];

function norm5(x){ return (x - 1) / 4; }            // 1..5 -> 0..1

// Self-Score = average of the 5 dimensions → 0..100 (rounded). null until any are scored.
function computeSelfScore(scores){
  var sum = 0, n = 0;
  for(var i = 0; i < SCORE_KEYS.length; i++){
    var v = scores && scores[SCORE_KEYS[i]];
    if(v >= 1 && v <= 5){ sum += norm5(v); n++; }
  }
  return n > 0 ? Math.round((sum / n) * 100) : null;
}
// Gates are pass/fail. Any fail → NOT READY no matter the score.
function verdict(gates){
  for(var i = 0; i < GATE_KEYS.length; i++){ if(!(gates && gates[GATE_KEYS[i]] === true)) return 'NOT READY'; }
  return 'READY';
}
// The stored rating — keyed by song title; the dashboard reads .selfScore + .status.
function buildRating(scores, gates, note, nowISO){
  var g = {}, s = {};
  for(var i = 0; i < GATE_KEYS.length; i++) g[GATE_KEYS[i]] = !!(gates && gates[GATE_KEYS[i]]);
  for(var j = 0; j < SCORE_KEYS.length; j++){ var v = scores && scores[SCORE_KEYS[j]]; s[SCORE_KEYS[j]] = (v >= 1 && v <= 5) ? v : null; }
  return { gates: g, scores: s, selfScore: computeSelfScore(scores), status: verdict(gates), note: (note || '').trim(), ratedAt: nowISO };
}
/* ======================== PURE-LOGIC-END ============================== */

/* ===== JSONP (sidesteps CORS, GET-only — same as the dashboard) ===== */
var jsonpId = 0;
function jsonp(params){
  return new Promise(function(resolve, reject){
    var cb = 'mosun_rcb_' + (jsonpId++);
    var s = document.createElement('script');
    var to = setTimeout(function(){ cleanup(); reject(new Error('timeout')); }, 20000);
    function cleanup(){ clearTimeout(to); try{ delete window[cb]; }catch(e){ window[cb] = undefined; } if(s.parentNode) s.parentNode.removeChild(s); }
    window[cb] = function(data){ cleanup(); resolve(data); };
    params.callback = cb;
    var q = Object.keys(params).map(function(k){ return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]); }).join('&');
    s.src = SCRIPT_URL + '?' + q;
    s.onerror = function(){ cleanup(); reject(new Error('network')); };
    document.head.appendChild(s);
  });
}

/* ===== crypto (verbatim from the dashboard) ===== */
function unb64(s){ return Uint8Array.from(atob(s), function(c){ return c.charCodeAt(0); }); }
function deriveKey(pass, salt){
  return crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey'])
    .then(function(mat){
      return crypto.subtle.deriveKey({ name:'PBKDF2', salt:salt, iterations:250000, hash:'SHA-256' },
        mat, { name:'AES-GCM', length:256 }, false, ['encrypt', 'decrypt']);
    });
}
function decryptToken(pass, lock){
  return deriveKey(pass, unb64(lock.s)).then(function(key){
    return crypto.subtle.decrypt({ name:'AES-GCM', iv:unb64(lock.i) }, key, unb64(lock.c));
  }).then(function(pt){ return new TextDecoder().decode(pt); });
}

/* ===== run state ===== */
var run = { song:'', idx:-1, gates:{}, scores:{}, note:'' };
var prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function setMsg(t, cls){ var m = $('msg'); m.textContent = t || ''; m.className = 'msg' + (cls ? ' ' + cls : ''); }

/* ===== stage transitions ===== */
var transitioning = false;
function swap(html, after){
  var st = $('stage');
  if(prefersReduced){ st.innerHTML = html; st.classList.add('in'); if(after) after(); return; }
  transitioning = true;
  st.classList.remove('in'); st.classList.add('leaving');
  setTimeout(function(){
    st.innerHTML = html;
    st.classList.remove('leaving'); st.classList.add('entering');
    requestAnimationFrame(function(){ requestAnimationFrame(function(){
      st.classList.remove('entering'); st.classList.add('in'); transitioning = false; if(after) after();
    }); });
  }, 480);
}
function scatter(str){
  return String(str).split('').map(function(c, i){
    if(c === ' ') return ' ';
    return '<span class="ch" style="transition-delay:' + (prefersReduced ? 0 : (60 + i * 26)) + 'ms">' + esc(c) + '</span>';
  }).join('');
}
function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]; }); }
function dotsHtml(){
  var h = '';
  for(var i = 0; i < 9; i++){
    var cls = 'd';
    if(i < run.idx) cls += (i < 4 && run.gates[GATES[i].key] === false) ? ' fail' : ' done';
    else if(i === run.idx) cls += ' now';
    h += '<span class="' + cls + '"></span>';
  }
  return '<div class="dots">' + h + '</div>';
}

/* ===== screens ===== */
function renderStart(prefill){
  run = { song: (prefill && prefill.song) || '', idx:-1, gates:(prefill && prefill.gates) || {}, scores:(prefill && prefill.scores) || {}, note:(prefill && prefill.note) || '' };
  swap(
    '<div class="kicker">Self-Filter</div>' +
    '<div class="qtitle">' + scatter('Which song?') + '</div>' +
    '<input class="start-in" id="songIn" placeholder="song title…" value="' + esc(run.song) + '" autocomplete="off">' +
    '<div class="flowfoot"><span class="navhint"><kbd>Enter</kbd> to begin</span>' +
    '<button class="btn primary" id="beginBtn">Begin</button></div>',
    function(){
      var inp = $('songIn'); if(inp){ inp.focus(); inp.addEventListener('keydown', function(e){ if(e.key === 'Enter'){ e.preventDefault(); begin(); } }); }
      var b = $('beginBtn'); if(b) b.addEventListener('click', begin);
    });
}
function begin(){
  var t = ($('songIn') && $('songIn').value || '').trim();
  if(!t){ setMsg('Enter a song title.', 'err'); return; }
  setMsg(''); run.song = t; run.idx = 0; renderStep();
}
function renderStep(){
  if(run.idx < 0) return renderStart(run);
  if(run.idx >= 9) return renderReveal();
  if(run.idx < 4) return renderGate(GATES[run.idx]);
  return renderScore(SCORES[run.idx - 4]);
}
function foot(){
  return '<div class="flowfoot">' + dotsHtml() +
    '<span class="navhint"><kbd>↑</kbd> back &middot; <kbd>↓</kbd>/<kbd>Enter</kbd> next</span></div>' +
    (run.idx > 0 ? '<button class="backlink" id="backBtn" style="margin-top:14px">← back</button>' : '');
}
function wireFoot(){ var b = $('backBtn'); if(b) b.addEventListener('click', function(){ go(-1); }); }

function renderGate(g){
  var cur = run.gates[g.key];
  swap(
    '<div class="kicker gate-k">Gate ' + (run.idx + 1) + ' / 4 · pass or fail</div>' +
    '<div class="qtitle">' + scatter(g.title) + '</div>' +
    '<div class="qprompt">' + g.q + '</div>' +
    '<div class="choices">' +
      '<button class="choice pass' + (cur === true ? ' sel' : '') + '" data-v="1">PASS<span class="hint">it clears the bar</span></button>' +
      '<button class="choice fail' + (cur === false ? ' sel' : '') + '" data-v="0">FAIL<span class="hint">not yet</span></button>' +
    '</div>' + foot(),
    function(){
      wireFoot();
      $('stage').querySelectorAll('.choice').forEach(function(el){
        el.addEventListener('click', function(){ chooseGate(g.key, el.getAttribute('data-v') === '1'); });
      });
    });
}
function chooseGate(key, pass){
  run.gates[key] = pass;
  if(!pass) setMsg('Noted — a gate fell. Finish the run.', '');
  else setMsg('');
  go(1);
}

function renderScore(s){
  var cur = run.scores[s.key];
  var cells = '';
  for(var v = 1; v <= 5; v++) cells += '<button class="score' + (cur === v ? ' sel' : '') + '" data-v="' + v + '">' + v + '</button>';
  swap(
    '<div class="kicker">Score ' + (run.idx - 3) + ' / 5 · 1–5</div>' +
    '<div class="qtitle">' + scatter(s.title.replace('&amp;', '&')) + '</div>' +
    '<ul class="subs">' + s.subs.map(function(x){ return '<li>' + x + '</li>'; }).join('') + '</ul>' +
    '<div class="scorerow">' + cells + '</div>' +
    '<div class="scorelab" style="max-width:430px"><span>weak</span><span>undeniable</span></div>' + foot(),
    function(){
      wireFoot();
      $('stage').querySelectorAll('.score').forEach(function(el){
        el.addEventListener('click', function(){ setScore(s.key, parseInt(el.getAttribute('data-v'), 10)); });
      });
    });
}
function setScore(key, v){ run.scores[key] = v; setMsg(''); go(1); }

function go(delta){
  if(transitioning) return;
  run.idx += delta;
  if(run.idx < -0) run.idx = -1;
  renderStep();
}

/* ===== reveal ===== */
function renderReveal(){
  var score = computeSelfScore(run.scores);
  var status = verdict(run.gates);
  var ready = status === 'READY';
  var dimHtml = SCORE_KEYS.map(function(k, i){ return '<span class="dimchip">' + esc(SCORES[i].title.replace('&amp;', '&')) + ' <b>' + (run.scores[k] || '–') + '</b></span>'; }).join('');
  var gateHtml = GATE_KEYS.map(function(k, i){ var p = run.gates[k] === true; return '<span class="gatechip ' + (p ? 'pass' : 'fail') + '">' + esc(GATES[i].title) + ' · ' + (p ? 'pass' : 'fail') + '</span>'; }).join('');
  swap(
    '<div class="reveal">' +
      '<div class="bloom" id="bloom"></div>' +
      '<div class="kicker">' + esc(run.song) + '</div>' +
      '<div class="bigscore"><span id="count">0</span><span class="of"> / 100</span></div>' +
      '<div class="verdict ' + (ready ? 'ready' : 'notready') + '">' + (ready ? 'READY' : '<span class="nr">NOT</span> READY') + '</div>' +
      '<div class="gatechips" style="margin-top:22px">' + gateHtml + '</div>' +
      '<div class="dimgrid">' + dimHtml + '</div>' +
      '<textarea class="notefield" id="noteIn" placeholder="optional note…">' + esc(run.note) + '</textarea>' +
      '<div class="revealbtns">' +
        '<button class="backlink" id="backBtn">← back</button>' +
        '<button class="btn primary" id="saveBtn">Save rating</button>' +
        '<button class="btn small" id="restartBtn">New song</button>' +
      '</div>' +
    '</div>',
    function(){
      wireFoot();
      if(ready){ var bl = $('bloom'); if(bl) requestAnimationFrame(function(){ bl.classList.add('on'); }); }
      countUp($('count'), score == null ? 0 : score);
      $('saveBtn').addEventListener('click', function(){ run.note = $('noteIn').value; save(); });
      $('restartBtn').addEventListener('click', function(){ renderStart({}); });
    });
}
function countUp(el, target){
  if(!el) return;
  if(prefersReduced){ el.textContent = target; return; }
  var start = null, dur = 1200;
  function frame(ts){
    if(start === null) start = ts;
    var p = Math.min(1, (ts - start) / dur);
    var eased = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(eased * target);
    if(p < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* ===== save ===== */
function save(){
  var btn = $('saveBtn'); btn.disabled = true;
  setMsg('Saving…');
  var rating = buildRating(run.scores, run.gates, run.note, new Date().toISOString());
  jsonp({ action:'save', token:READ_TOKEN, key:run.song, value:JSON.stringify(rating) })
    .then(function(res){
      if(res && res.ok){ setMsg('Saved to the Sheet ✓', 'ok'); loadLibrary(); }
      else setMsg('Sheet refused: ' + ((res && res.error) || '?'), 'err');
    })
    .catch(function(){ setMsg('Sheet unreachable — try again.', 'err'); })
    .then(function(){ btn.disabled = false; });
}

/* ===== library ===== */
function loadLibrary(){
  jsonp({ action:'data', token:READ_TOKEN })
    .then(function(data){
      if(data && data.error) throw new Error(data.error);
      var sf = (data && data.selfFilter) || {};
      var items = [];
      Object.keys(sf).forEach(function(k){
        if(k === 'config' || k.indexOf('scores::') === 0) return;
        var v = sf[k];
        if(v && typeof v === 'object' && typeof v.selfScore !== 'undefined' && v.status) items.push({ song:k, r:v });
      });
      items.sort(function(a, b){ return (b.r.selfScore || 0) - (a.r.selfScore || 0); });
      renderLibrary(items);
    })
    .catch(function(){ $('lib').innerHTML = '<div class="libempty">Could not load ratings.</div>'; });
}
function renderLibrary(items){
  var lib = $('lib');
  if(!items.length){ lib.innerHTML = '<div class="libempty">No ratings yet — run one above.</div>'; return; }
  lib.innerHTML = '';
  items.forEach(function(it){
    var ready = it.r.status === 'READY';
    var el = document.createElement('div');
    el.className = 'libitem';
    el.innerHTML = '<span class="lname">' + esc(it.song) + '</span>' +
      '<span class="lstat ' + (ready ? 'ready' : 'notready') + '">' + esc(it.r.status) + '</span>' +
      '<span class="lscore">' + (it.r.selfScore == null ? '–' : it.r.selfScore) + '</span>';
    el.addEventListener('click', function(){ renderStart({ song:it.song, gates:it.r.gates || {}, scores:it.r.scores || {}, note:it.r.note || '' }); window.scrollTo({ top:0, behavior:prefersReduced ? 'auto' : 'smooth' }); });
    lib.appendChild(el);
  });
}

/* ===== keyboard ===== */
document.addEventListener('keydown', function(e){
  if($('app').classList.contains('hidden')) return;
  var typing = /^(input|textarea)$/i.test((e.target.tagName || ''));
  if(run.idx < 0 || run.idx >= 9) return;        // start handles its own Enter; reveal is mouse
  if(typing) return;
  if(e.key === 'ArrowUp'){ e.preventDefault(); go(-1); return; }
  if(e.key === 'ArrowDown' || e.key === 'Enter'){ e.preventDefault();
    // Enter/down advances only if the current step has an answer
    if(run.idx < 4){ if(typeof run.gates[GATES[run.idx].key] === 'boolean') go(1); }
    else { if(run.scores[SCORES[run.idx - 4].key]) go(1); }
    return;
  }
  if(run.idx < 4){
    if(e.key === 'ArrowLeft' || e.key === 'p' || e.key === 'P'){ e.preventDefault(); chooseGate(GATES[run.idx].key, true); }
    else if(e.key === 'ArrowRight' || e.key === 'f' || e.key === 'F'){ e.preventDefault(); chooseGate(GATES[run.idx].key, false); }
  } else {
    if(/^[1-5]$/.test(e.key)){ e.preventDefault(); setScore(SCORES[run.idx - 4].key, parseInt(e.key, 10)); }
  }
});

/* ===== gate / boot ===== */
function unlock(){
  $('gate').remove();
  $('app').classList.remove('hidden');
  renderStart({});
  loadLibrary();
}
function initGate(){
  var cached = sessionStorage.getItem('mosun_ar_token');
  if(cached){ READ_TOKEN = cached; unlock(); return; }
  function attempt(){
    var pass = $('gatePass').value;
    if(!pass){ $('gateErr').textContent = 'Enter a passphrase.'; return; }
    $('gateBtn').disabled = true; $('gateErr').textContent = '';
    decryptToken(pass, LOCK).then(function(token){
      READ_TOKEN = token; sessionStorage.setItem('mosun_ar_token', token); unlock();
    }).catch(function(){ $('gateErr').textContent = 'Wrong passphrase.'; $('gateBtn').disabled = false; $('gatePass').select(); });
  }
  $('gateBtn').addEventListener('click', attempt);
  $('gatePass').addEventListener('keydown', function(e){ if(e.key === 'Enter') attempt(); });
  $('gatePass').focus();
}
initGate();
</script>
