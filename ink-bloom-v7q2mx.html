<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>MOSUN — Ink-Bloom (demo)</title>
<link rel="stylesheet" href="theme.css">
<style>
/* ============================================================================
   DEMO PAGE chrome (NOT part of the reusable module — safe to drop)
   ========================================================================== */
html, body { margin:0; background:#000; }
body { font-family:var(--font-body); color:var(--cream); -webkit-font-smoothing:antialiased; }

.hero { position:relative; height:100vh; overflow:hidden; }

/* subtle edge vignette + a soft dark scrim behind the text, for legibility */
.vignette { position:absolute; inset:0; z-index:2; pointer-events:none;
  background:
    radial-gradient(ellipse 58% 42% at 50% 52%, rgba(0,0,0,0.46), rgba(0,0,0,0) 70%),
    radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0) 42%, rgba(0,0,0,0.55) 100%); }

.stage { position:absolute; inset:0; z-index:3; display:flex; flex-direction:column;
  align-items:center; justify-content:center; text-align:center; padding:24px; }
.kicker { font-family:var(--font-body); font-size:11px; letter-spacing:0.28em; text-transform:uppercase;
  color:var(--n2); display:flex; align-items:center; gap:9px; margin-bottom:26px; }
.kicker .dot { color:var(--saffron); }
.title { font-family:var(--font-display); font-weight:400; text-transform:uppercase;
  letter-spacing:0.14em; font-size:clamp(44px,11vw,104px); line-height:0.98; color:var(--cream); margin:0; }
.sub { font-family:var(--font-body); font-size:clamp(14px,3.6vw,17px); color:var(--n1);
  letter-spacing:0.02em; max-width:30ch; margin:22px auto 40px; line-height:1.5; }
.pill { font-family:var(--font-body); font-size:12px; letter-spacing:0.22em; text-transform:uppercase;
  color:#1a0d04; background:var(--saffron); border:none; border-radius:var(--r-pill);
  padding:15px 36px; cursor:pointer; transition:background .9s var(--ease), box-shadow .9s var(--ease), transform .9s var(--ease); }
.pill:hover { background:var(--saffron-soft); box-shadow:0 0 46px rgba(246,162,92,0.5); transform:translateY(-1px); }

.more { min-height:150vh; display:flex; align-items:flex-start; justify-content:center;
  padding:120px 24px; }
.more p { font-family:var(--font-body); font-size:13px; letter-spacing:0.04em; color:var(--n3); max-width:42ch; text-align:center; line-height:1.6; }

#diag { position:fixed; right:12px; bottom:12px; z-index:9; font-family:ui-monospace,monospace;
  font-size:10px; letter-spacing:0.04em; color:var(--n3); background:rgba(0,0,0,0.45);
  border:1px solid var(--hairline); border-radius:100px; padding:5px 11px; pointer-events:none; }

/* ============================================================================
   INK-BLOOM MODULE — CSS  (START · lift this with the canvas + script)
   One <canvas> over one CSS-only fallback. The fallback always sits behind the
   canvas; if WebGL is unavailable/forced-off the script hides the canvas and the
   fallback shows through. Both are full-bleed within their positioned parent.
   ========================================================================== */
.ink-canvas, .ink-fallback { position:absolute; inset:0; z-index:0; display:block; width:100%; height:100%; }
.ink-canvas { z-index:1; background:#000; }

/* CSS-only fallback: saffron core → oxblood → black, faint offset violet depth blob, grain, slow drift */
.ink-fallback {
  background:
    radial-gradient(circle at 61% 59%, rgba(59,21,48,0.40) 0%, rgba(59,21,48,0) 40%),
    radial-gradient(circle at 50% 46%, #FFF6E8 0%, #F6A25C 5%, #D8823A 11%, #7E0101 26%, #240303 46%, #000 70%);
  animation:inkdrift 34s ease-in-out infinite; will-change:transform; transform:scale(1.04);
}
.ink-fallback::after {
  content:""; position:absolute; inset:0; pointer-events:none; opacity:0.08; mix-blend-mode:soft-light;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  background-size:160px 160px;
}
@keyframes inkdrift { 0%,100% { transform:scale(1.04) translate(0,0); } 50% { transform:scale(1.09) translate(-1.1%, 0.9%); } }
/* when the shader is live, don't waste compositor work animating the hidden fallback */
.ink-live .ink-fallback { animation:none; }
@media (prefers-reduced-motion: reduce) { .ink-fallback { animation:none; } }
/* INK-BLOOM MODULE — CSS (END) */
</style>
</head>
<body>

<div class="hero">
  <!-- INK-BLOOM MODULE — MARKUP (the only required elements: canvas + fallback) -->
  <canvas id="inkbloom" class="ink-canvas" aria-hidden="true"></canvas>
  <div class="ink-fallback" aria-hidden="true"></div>
  <!-- /INK-BLOOM MODULE — MARKUP -->

  <div class="vignette"></div>
  <div class="stage">
    <div class="kicker">MOSUN <span class="dot">·</span> LISTEN</div>
    <h1 class="title">After-Dark</h1>
    <p class="sub">An ember breathing in the dark — a record you sit inside, not just hear.</p>
    <button class="pill" type="button">Press Play</button>
  </div>
</div>

<section class="more">
  <p>Keep scrolling. The bloom pauses the moment it leaves the screen (IntersectionObserver) and when you switch tabs (visibilitychange) — watch the badge in the corner.</p>
</section>

<div id="diag">render: …</div>

<script>
/* ============================================================================
   INK-BLOOM MODULE — SCRIPT  (START · self-contained, no dependencies)

   initInkBloom(canvasEl, options) -> { mode, status(), destroy() }
   options = { intensity=1, violet=0..1 (default .18), speed=1,
               maxResolution=1280, fps=30, mode:'auto'|'css', still:false }

   A raw-WebGL saffron ink-bloom (fbm + domain warp, drifting glowing core,
   oxblood + restrained violet depth, filament tendrils, animated grain).
   Phone-safe: downscaled buffer, fps cap, pauses when hidden/off-screen,
   feature-detects WebGL, renders one static frame under reduced-motion.
   ========================================================================== */
function initInkBloom(canvas, options) {
  options = options || {};
  var opts = {
    intensity:     options.intensity     != null ? options.intensity     : 1.0,
    violet:        options.violet         != null ? options.violet        : 0.18,
    speed:         options.speed          != null ? options.speed         : 1.0,
    maxResolution: options.maxResolution  || 1280,
    fps:           options.fps            || 30,
    renderScale:   options.renderScale    || 0.65,
    mode:          options.mode           || 'auto',
    still:         !!options.still
  };
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) opts.still = true;

  // --- WebGL feature-detect / forced CSS → hide canvas so the fallback shows ---
  var gl = null;
  if (opts.mode !== 'css') {
    try {
      gl = canvas.getContext('webgl', { antialias:false, alpha:false, depth:false, stencil:false, preserveDrawingBuffer:false, powerPreference:'low-power' })
        || canvas.getContext('experimental-webgl');
    } catch (e) { gl = null; }
  }
  function cssHandle() { canvas.style.display = 'none'; return { mode:'css', status:function(){ return 'css'; }, destroy:function(){ canvas.style.display=''; } }; }
  if (!gl) return cssHandle();

  var VERT = 'attribute vec2 a_pos; void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }';
  var FRAG = [
    '#ifdef GL_FRAGMENT_PRECISION_HIGH',
    'precision highp float;',
    '#else',
    'precision mediump float;',
    '#endif',
    'uniform vec2 u_res; uniform float u_time; uniform float u_intensity; uniform float u_violet;',
    'float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453123); }',
    'float vnoise(vec2 p){ vec2 i=floor(p), f=fract(p);',
    '  float a=hash(i), b=hash(i+vec2(1.,0.)), c=hash(i+vec2(0.,1.)), d=hash(i+vec2(1.,1.));',
    '  vec2 u=f*f*(3.-2.*f); return mix(mix(a,b,u.x), mix(c,d,u.x), u.y); }',
    'float fbm(vec2 p){ float v=0., a=0.5; mat2 m=mat2(1.6,1.2,-1.2,1.6);',
    '  for(int i=0;i<5;i++){ v+=a*vnoise(p); p=m*p; a*=0.5; } return v; }',
    'void main(){',
    '  vec2 uv=(gl_FragCoord.xy-0.5*u_res)/u_res.y;',
    '  float t=u_time;',
    '  vec2 ctr=vec2(sin(t*0.05)*0.05, cos(t*0.043)*0.045);',   // slow drifting core
    '  vec2 p=uv-ctr;',
    '  vec2 q=vec2(fbm(p*1.6 + t*0.03), fbm(p*1.6 + vec2(5.2,1.3) - t*0.025));',   // domain warp
    '  vec2 r=vec2(fbm(p*1.6 + 1.2*q + vec2(1.7,9.2) + t*0.02), fbm(p*1.6 + 1.2*q + vec2(8.3,2.8) - t*0.018));',
    '  float f=fbm(p*1.6 + 1.6*r);',
    '  float rad=length(p);',
    '  float d=rad*(0.82+0.55*f) - 0.10*r.x;',                  // noise-distorted radius → fluid rings
    '  vec3 hot=vec3(1.000,0.965,0.910);',                      // #FFF6E8
    '  vec3 saff=vec3(0.965,0.635,0.360);',                     // #F6A25C
    '  vec3 amber=vec3(0.847,0.510,0.227);',                    // #D8823A
    '  vec3 oxb=vec3(0.494,0.004,0.004);',                      // #7E0101
    '  vec3 viol=vec3(0.231,0.082,0.188);',                     // #3B1530
    '  vec3 ink=vec3(0.0);',
    '  vec3 col=hot;',
    '  col=mix(col, saff,  smoothstep(0.02,0.16,d));',
    '  col=mix(col, amber, smoothstep(0.12,0.30,d));',
    '  col=mix(col, oxb,   smoothstep(0.26,0.52,d));',
    '  vec3 outer=mix(oxb, viol, clamp(u_violet,0.0,1.0));',    // dialable deep-violet depth note
    '  col=mix(col, outer, smoothstep(0.46,0.72,d)*0.85);',
    '  col=mix(col, ink,   smoothstep(0.64,1.05,d));',
    '  float ridge=1.0-abs(fbm(p*5.5 + r*2.4 + t*0.04)*2.0-1.0);',   // filament tendrils
    '  ridge=pow(clamp(ridge,0.0,1.0), 3.5);',
    '  float filMask=smoothstep(0.05,0.22,rad)*(1.0-smoothstep(0.42,0.85,rad));',
    '  col+=saff*ridge*filMask*0.35;',
    '  float waves=0.5+0.5*sin(rad*34.0 - t*0.45 + f*4.0);',         // concentric pressure waves
    '  col+=saff*waves*(1.0-smoothstep(0.12,0.5,rad))*0.05;',
    '  float core=exp(-rad*rad*14.0);',                              // additive glowing core + halo
    '  float halo=exp(-rad*2.6);',
    '  col+=hot*core*1.5 + saff*halo*0.5;',
    '  col*=u_intensity;',
    '  col*=(1.0-smoothstep(0.25,1.15,rad));',                       // fade to page-black at edges
    '  float g=hash(gl_FragCoord.xy*0.7 + fract(t)*vec2(13.1,7.7));',// animated film grain
    '  col+=(g-0.5)*0.05;',
    '  gl_FragColor=vec4(max(col,0.0),1.0);',
    '}'
  ].join('\n');

  function sh(type, src) {
    var s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { if (window.console) console.warn('ink-bloom shader:', gl.getShaderInfoLog(s)); gl.deleteShader(s); return null; }
    return s;
  }
  var vs = sh(gl.VERTEX_SHADER, VERT), fs = sh(gl.FRAGMENT_SHADER, FRAG);
  if (!vs || !fs) return cssHandle();
  var prog = gl.createProgram(); gl.attachShader(prog, vs); gl.attachShader(prog, fs); gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) { if (window.console) console.warn('ink-bloom link:', gl.getProgramInfoLog(prog)); return cssHandle(); }
  gl.useProgram(prog);

  var quad = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, quad);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos'); gl.enableVertexAttribArray(aPos); gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uRes = gl.getUniformLocation(prog, 'u_res'), uTime = gl.getUniformLocation(prog, 'u_time'),
      uInt = gl.getUniformLocation(prog, 'u_intensity'), uVio = gl.getUniformLocation(prog, 'u_violet');
  gl.uniform1f(uInt, opts.intensity); gl.uniform1f(uVio, opts.violet);

  function resize() {
    var rect = canvas.getBoundingClientRect();
    var cssW = Math.max(1, rect.width), cssH = Math.max(1, rect.height);
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var w = cssW * dpr * opts.renderScale, h = cssH * dpr * opts.renderScale;
    var le = Math.max(w, h); if (le > opts.maxResolution) { var k = opts.maxResolution / le; w *= k; h *= k; }
    w = Math.max(2, Math.floor(w)); h = Math.max(2, Math.floor(h));
    if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; }
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.uniform2f(uRes, canvas.width, canvas.height);
  }

  var raf = 0, last = -1e9, t0 = null, interval = 1000 / opts.fps;
  var visible = true, onscreen = true, destroyed = false;
  function draw(ts) { if (t0 === null) t0 = ts; gl.uniform1f(uTime, ((ts - t0) / 1000) * opts.speed); gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4); }
  function renderStill() { gl.uniform1f(uTime, 6.0 * opts.speed); gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4); }
  function loop(ts) { if (destroyed) return; raf = requestAnimationFrame(loop); if (ts - last < interval) return; last = ts; draw(ts); }
  function start() { if (destroyed || opts.still) return; if (!raf) { last = -1e9; raf = requestAnimationFrame(loop); } }
  function stop() { if (raf) { cancelAnimationFrame(raf); raf = 0; } }
  function sync() { if (visible && onscreen) start(); else stop(); }

  function onVis() { visible = !document.hidden; sync(); }
  function onWinResize() { resize(); if (opts.still) renderStill(); }
  function onLost(e) { e.preventDefault(); stop(); canvas.style.display = 'none'; }   // context loss → reveal fallback
  document.addEventListener('visibilitychange', onVis);
  canvas.addEventListener('webglcontextlost', onLost, false);

  var io = null, ro = null;
  if ('IntersectionObserver' in window) { io = new IntersectionObserver(function (es) { onscreen = es[0].isIntersecting; sync(); }, { threshold: 0 }); io.observe(canvas); }
  if ('ResizeObserver' in window) { ro = new ResizeObserver(function () { resize(); if (opts.still) renderStill(); }); ro.observe(canvas); }
  else window.addEventListener('resize', onWinResize);

  resize();
  if (opts.still) renderStill(); else sync();

  return {
    mode: opts.still ? 'still' : 'webgl',
    status: function () { return destroyed ? 'destroyed' : (opts.still ? 'still' : (raf ? 'running' : 'paused')); },
    destroy: function () {
      destroyed = true; stop();
      document.removeEventListener('visibilitychange', onVis);
      canvas.removeEventListener('webglcontextlost', onLost);
      if (io) io.disconnect();
      if (ro) ro.disconnect(); else window.removeEventListener('resize', onWinResize);
      var lose = gl.getExtension('WEBGL_lose_context'); if (lose) lose.loseContext();
      canvas.style.display = '';
    }
  };
}
/* INK-BLOOM MODULE — SCRIPT (END) */

/* ---- demo bootstrap: reads ?mode=css and ?still=1, wires the diag badge ---- */
(function () {
  var params = new URLSearchParams(location.search);
  var canvas = document.getElementById('inkbloom');
  var handle = initInkBloom(canvas, {
    mode:   params.get('mode') === 'css' ? 'css' : 'auto',
    still:  params.get('still') === '1',
    violet: 0.18, intensity: 1.0, speed: 1.0
  });
  document.querySelector('.hero').classList.toggle('ink-live', handle.mode === 'webgl' || handle.mode === 'still');
  var diag = document.getElementById('diag');
  function upd() { diag.textContent = 'render: ' + handle.mode + (handle.status ? ' · ' + handle.status() : ''); }
  upd(); setInterval(upd, 600);
})();
</script>
</body>
</html>
