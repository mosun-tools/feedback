<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>MOSUN — Listen</title>
<link rel="stylesheet" href="theme.css">
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ background:var(--ink); color:var(--cream); }
body{ font-family:var(--font-body); line-height:1.5; -webkit-font-smoothing:antialiased; min-height:100vh; overflow-x:hidden; }
::selection{ background:var(--saffron); color:var(--ink); }

/* ===== ambience ===== */
#particles{ position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0; transition:opacity 2s var(--ease); }
#particles.on{ opacity:1; }
#sky{ content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:radial-gradient(ellipse 80% 50% at 50% 120%, rgba(246,162,92,0.05), transparent 60%); transition:background 1.4s var(--ease); }
#sun{ position:fixed; left:50%; top:60%; width:min(70vw,340px); height:min(35vw,170px); z-index:0; pointer-events:none;
  border-radius:9999px 9999px 0 0;
  background:radial-gradient(ellipse at 50% 100%, var(--saffron) 0%, rgba(246,162,92,0.55) 28%, rgba(246,162,92,0.10) 60%, transparent 75%);
  transform:translate(-50%, 175%); opacity:0.0; filter:blur(2px);
  transition:transform 1.5s var(--ease), opacity 1.5s var(--ease), filter 1.5s var(--ease); }
@media (prefers-reduced-motion: reduce){ #particles{ display:none; } #sun, #sky{ transition:none; } }

/* ===== layout ===== */
.wrap{ position:relative; z-index:2; max-width:520px; margin:0 auto; padding:22px 22px 96px; min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
.hidden{ display:none !important; }

/* topbar (mute) */
.topbar{ display:flex; justify-content:space-between; align-items:center; gap:12px; min-height:34px; }

/* breathing orb — the focal point (cover art) */
.orbwrap{ position:relative; display:inline-flex; align-items:center; justify-content:center; }
.orbwrap::before{ content:''; position:absolute; inset:-10%; border-radius:50%; pointer-events:none;
  background:radial-gradient(circle, rgba(246,162,92,0.30), transparent 68%); animation:breathe 5.6s var(--ease) infinite; }
.orb{ border-radius:50%; object-fit:cover; background:#070707; border:1px solid var(--border-strong); position:relative; z-index:1; }
.orb.big{ width:min(58vw,224px); aspect-ratio:1; }
.orb.sm{ width:min(30vw,112px); aspect-ratio:1; }
.orbph{ display:flex; align-items:center; justify-content:center; font-family:var(--font-deco); color:var(--saffron); }
.orb.big .orbph, .orbph.big{ font-size:64px; }
.orb.sm .orbph, .orbph.sm{ font-size:34px; }
.orb.spin{ animation:spin 26s linear infinite; }
@keyframes breathe{ 0%,100%{ opacity:.4; transform:scale(.97); } 50%{ opacity:.85; transform:scale(1.05); } }
@keyframes spin{ to{ transform:rotate(360deg); } }
@media (prefers-reduced-motion: reduce){ .orbwrap::before{ animation:none; } .orb.spin{ animation:none; } }

/* now-playing — persistent, centered, dark slim player */
#np{ text-align:center; opacity:0; max-height:0; overflow:hidden; transition:opacity 1s var(--ease), max-height 1s var(--ease); }
#np.on{ opacity:1; max-height:420px; margin:6px 0 2px; }
#np .npt{ font-size:10px; letter-spacing:0.24em; text-transform:uppercase; color:var(--n3); margin:16px 0 12px; }
#np .npt b{ color:var(--saffron); font-weight:400; }
.discoframe{ width:100%; max-width:420px; margin:0 auto; height:120px; border:1px solid var(--hairline); border-radius:var(--r-card); background:#050505; overflow:hidden; }
.discoframe iframe{ width:100%; height:100%; border:0; display:block; background:#050505; }
.markk{ font-family:var(--font-display); font-weight:400; font-size:13px; letter-spacing:0.34em; text-transform:uppercase; color:var(--n3); }
.markk .dot{ color:var(--saffron); }
.iconbtn{ font-family:var(--font-body); font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--n3);
  background:none; border:1px solid var(--hairline); border-radius:var(--r-pill); padding:6px 12px; cursor:pointer; transition:color .6s var(--ease), border-color .6s var(--ease); }
.iconbtn:hover{ color:var(--saffron); border-color:var(--saffron); }

/* stage — fully centered */
.stage{ flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:26px 0;
  transition:opacity .5s var(--ease), transform .6s var(--ease); }
.stage.leaving{ opacity:0; transform:translateY(-12px) scale(0.99); }
.stage.entering{ opacity:0; transform:translateY(14px) scale(0.99); }
.kicker{ font-size:10px; letter-spacing:0.3em; text-transform:uppercase; color:var(--saffron); margin-bottom:16px; }
.qtitle{ font-family:var(--font-display); font-weight:400; text-transform:uppercase; letter-spacing:0.05em; line-height:1.04;
  font-size:clamp(30px,8vw,52px); margin-bottom:14px; }
.qtitle .ch{ display:inline-block; opacity:0; transform:translateY(10px); transition:opacity .9s var(--ease), transform .9s var(--ease); }
.stage.in .qtitle .ch{ opacity:1; transform:none; }
.qprompt{ font-size:16px; color:var(--n2); max-width:480px; margin:0 auto 30px; }
.cap{ font-family:var(--font-quote); font-style:italic; color:var(--n3); font-size:15px; }

/* title / start card */
.titleorb{ margin-bottom:30px; opacity:0; transform:scale(.94); transition:opacity 1.3s var(--ease), transform 1.3s var(--ease); }
.stage.in .titleorb{ opacity:1; transform:none; }
.bigplay{ margin-top:26px; }
.btn{ font-family:var(--font-body); font-size:12px; letter-spacing:0.2em; text-transform:uppercase; padding:15px 34px;
  border-radius:var(--r-pill); border:1px solid var(--border-strong); background:transparent; color:var(--cream); cursor:pointer;
  transition:border-color .9s var(--ease), background .9s var(--ease), color .9s var(--ease), box-shadow .9s var(--ease), transform .5s var(--ease); }
.btn:hover{ border-color:var(--saffron); box-shadow:0 0 0 1px var(--saffron), 0 0 36px -6px var(--saffron); }
.btn.primary{ background:var(--saffron); color:var(--ink); border-color:var(--saffron); }
.btn.primary:hover{ background:var(--saffron-hover); border-color:var(--saffron-hover); box-shadow:0 0 48px -6px var(--saffron); transform:translateY(-1px); }
.btn.small{ padding:10px 18px; font-size:11px; }
.btn.ghost{ border-color:transparent; color:var(--n3); }
.btn.ghost:hover{ color:var(--saffron); box-shadow:none; }
.btn:disabled{ opacity:.4; cursor:not-allowed; box-shadow:none; }

/* reaction faces */
.faces{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; max-width:440px; margin:0 auto; }
.face{ position:relative; flex:1 1 84px; min-width:84px; aspect-ratio:1; max-width:108px; border-radius:var(--r-card);
  border:1px solid var(--border-strong); background:#070707; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
  transition:border-color .5s var(--ease), box-shadow .7s var(--ease), transform .4s var(--ease); overflow:hidden; }
.face .em{ font-size:30px; line-height:1; }
.face .fl{ font-size:9px; letter-spacing:0.16em; text-transform:uppercase; color:var(--n3); }
.face:hover, .face.sel{ border-color:var(--saffron); transform:translateY(-3px); box-shadow:0 0 0 1px var(--saffron), 0 0 40px -10px var(--saffron); }
.face.sel .fl{ color:var(--saffron); }

/* hook charge meter */
.charge{ display:flex; align-items:flex-end; justify-content:center; gap:18px; }
.meter{ display:flex; flex-direction:column-reverse; gap:6px; touch-action:none; cursor:pointer; user-select:none; }
.seg{ width:120px; height:34px; border-radius:6px; border:1px solid var(--border-strong); background:#070707;
  transition:background .35s var(--ease), box-shadow .5s var(--ease), border-color .35s var(--ease); }
.seg.lit{ background:var(--saffron); border-color:var(--saffron); box-shadow:0 0 26px -8px var(--saffron); }
.chargenum{ font-family:var(--font-display); font-size:clamp(64px,20vw,120px); line-height:0.9; color:var(--cream); min-width:1.2em; text-align:center; }
.chargenum #cnum.ghost{ color:var(--n4); }
.chargenum .of{ display:block; font-family:var(--font-body); font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:var(--n3); margin-top:10px; }
.chargelab{ display:flex; justify-content:space-between; gap:14px; max-width:300px; margin:16px auto 0; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--n4); }

/* generic choices */
.opts{ display:flex; flex-direction:column; gap:11px; max-width:360px; width:100%; margin:0 auto; }
.opt{ text-align:center; font-family:var(--font-body); font-size:16px; letter-spacing:0.02em; color:var(--cream);
  border:1px solid var(--border-strong); background:#070707; border-radius:var(--r-card); padding:18px 20px; cursor:pointer; position:relative;
  transition:border-color .5s var(--ease), box-shadow .7s var(--ease), transform .4s var(--ease), color .5s var(--ease); }
.opt:hover, .opt.sel{ border-color:var(--saffron); transform:translateY(-2px); box-shadow:0 0 0 1px var(--saffron), 0 0 34px -12px var(--saffron); }
.opt.dim{ color:var(--n2); }

/* text fields */
.field{ width:100%; max-width:460px; margin:0 auto; display:block; font-family:var(--font-body); font-size:16px; color:var(--cream); text-align:left;
  background:transparent; border:1px solid var(--border-strong); border-radius:var(--r-input); padding:13px 14px; outline:none; resize:vertical; }
.field:focus{ border-color:var(--saffron); }
.field::placeholder{ color:var(--n4); }
.line{ width:100%; max-width:420px; margin:0 auto; display:block; font-family:var(--font-display); font-size:24px; letter-spacing:0.06em; text-transform:uppercase; text-align:center;
  color:var(--cream); background:transparent; border:none; border-bottom:1px solid var(--border-strong); padding:12px 2px; outline:none; }
.line:focus{ border-color:var(--saffron); }
.line::placeholder{ color:var(--n4); font-family:var(--font-body); letter-spacing:normal; text-transform:none; }

/* foot / nav */
.foot{ display:flex; align-items:center; justify-content:center; gap:18px; margin-top:36px; flex-wrap:wrap; }
.navhint{ font-size:11px; letter-spacing:0.06em; color:var(--n4); }
.navhint kbd{ border:1px solid var(--hairline); border-radius:4px; padding:1px 5px; color:var(--n2); }
.backlink{ font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--n3); background:none; border:none; cursor:pointer; }
.backlink:hover{ color:var(--saffron); }
.actions{ display:flex; gap:10px; align-items:center; }

/* ripple */
.ripple{ position:fixed; z-index:50; pointer-events:none; border-radius:50%; width:14px; height:14px; margin:-7px 0 0 -7px;
  background:radial-gradient(circle, rgba(246,162,92,0.5), transparent 70%); transform:scale(0); opacity:0.9;
  animation:rip 620ms var(--ease) forwards; }
@keyframes rip{ to{ transform:scale(26); opacity:0; } }

/* reveal */
.reveal{ text-align:center; position:relative; }
.sunrise{ position:fixed; left:50%; top:50%; width:130vw; height:130vw; transform:translate(-50%,-30%) scale(.3); border-radius:50%;
  background:radial-gradient(circle, rgba(246,162,92,0.30), rgba(246,162,92,0.08) 40%, transparent 66%); opacity:0; pointer-events:none; z-index:1;
  transition:opacity 1.8s var(--ease), transform 2.2s var(--ease); }
.sunrise.on{ opacity:1; transform:translate(-50%,-30%) scale(1); }
.thx{ font-family:var(--font-display); font-weight:400; text-transform:uppercase; letter-spacing:0.12em; font-size:clamp(30px,8vw,52px); }
.note{ font-family:var(--font-quote); font-style:italic; font-size:clamp(18px,5vw,24px); color:var(--saffron-soft); line-height:1.45;
  max-width:480px; margin:24px auto 0; }
.signed{ font-family:var(--font-deco); color:var(--saffron); font-size:30px; margin-top:14px; }
.sendstate{ font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:var(--n3); margin-top:30px; min-height:18px; }
.sendstate.ok{ color:var(--saffron); } .sendstate.err{ color:var(--saffron-soft); }

/* ===== builder ===== */
.build{ max-width:560px; margin:0 auto; }
.build h2{ font-family:var(--font-display); font-weight:400; font-size:24px; letter-spacing:0.2em; text-transform:uppercase; }
.build .lead{ font-family:var(--font-quote); font-style:italic; color:var(--n2); font-size:15px; margin:10px 0 30px; }
.fld{ margin-bottom:20px; }
.fld label{ display:block; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--n3); margin-bottom:8px; }
.fld .opt-tag{ color:var(--n4); }
.bfield{ width:100%; font-family:var(--font-body); font-size:15px; color:var(--cream); background:#070707;
  border:1px solid var(--border-strong); border-radius:var(--r-input); padding:12px 13px; outline:none; resize:vertical; }
.bfield:focus{ border-color:var(--saffron); }
.bfield::placeholder{ color:var(--n4); }
.out{ margin-top:26px; padding:18px; border:1px solid var(--hairline); border-radius:var(--r-card); background:#070707; display:none; }
.out.on{ display:block; }
.out .lk{ width:100%; font-family:ui-monospace, monospace; font-size:12px; color:var(--saffron-soft); background:transparent;
  border:1px solid var(--hairline); border-radius:var(--r-input); padding:10px; word-break:break-all; resize:vertical; min-height:64px; }
.outbtns{ display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
.berr{ color:var(--saffron-soft); font-size:13px; min-height:18px; margin-top:6px; }
.foott{ margin-top:36px; font-size:11px; letter-spacing:0.04em; color:var(--n4); line-height:1.6; }
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div id="sky"></div>
<div id="sun"></div>
<div class="sunrise" id="sunrise"></div>

<div class="wrap" id="root">
  <div class="topbar">
    <span class="markk">MOSUN<span class="dot"> · </span>LISTEN</span>
    <button class="iconbtn hidden" id="muteBtn">Sound on</button>
  </div>
  <div id="np"></div>
  <div class="stage" id="stage"></div>
</div>

<script>
/* ============================================================
   MOSUN listening session — fan-facing.
   Builder (no #s) makes a link; the link (#s=…) runs the game.
   Submits to the SAME backend as index.html: doGet + URL params,
   mode:'no-cors', Song = the attached track title → Responses sheet.
   ============================================================ */
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzBHACycNb4bteP8p9jW-894zG0-IGYZzJYsvRJ5koZ8BgwBHkU2UXFUC6VuFQBnnOl/exec';
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]; }); }
var prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ---------- hash codec ---------- */
function b64urlEncode(str){ return btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function b64urlDecode(s){ s = s.replace(/-/g,'+').replace(/_/g,'/'); while(s.length % 4) s += '='; return decodeURIComponent(escape(atob(s))); }
function readConfig(){
  var m = (location.hash || '').match(/[#&]s=([^&]+)/);
  if(!m) return null;
  try{ var o = JSON.parse(b64urlDecode(m[1])); return (o && o.t && o.e) ? o : null; }
  catch(e){ return null; }
}
// Accept a full <iframe …> or a bare URL; return a clean https src or ''.
function extractEmbed(raw){
  raw = (raw || '').trim();
  if(!raw) return '';
  var m = raw.match(/src\s*=\s*["']([^"']+)["']/i);
  var url = m ? m[1] : raw;
  if(/^\/\//.test(url)) url = 'https:' + url;
  return /^https:\/\//i.test(url) ? url : '';
}

/* =======================================================================
   PURE-LOGIC-START — no DOM. Mirrored by test/listen.test.mjs.
   ======================================================================= */
var STEPS = ['reaction', 'hook', 'playlist', 'share', 'weak', 'remember', 'comments', 'name'];
var REQUIRED = ['reaction', 'hook', 'playlist', 'share', 'weak', 'remember'];

// Which steps still lack an answer (weakWhere is optional even when weak='Some parts').
function missingRequired(run){
  var out = [];
  for(var i = 0; i < REQUIRED.length; i++){
    var k = REQUIRED[i];
    var v = run[k];
    if(k === 'hook'){ if(!(v >= 1 && v <= 5)) out.push(k); }
    else if(v === undefined || v === null || v === '') out.push(k);
  }
  return out;
}
// Build the exact param set index.html sends. hook as a bare integer (safe on old + fixed backend).
function buildParams(run, songTitle){
  return {
    name: (run.name || '').trim() || 'Anonymous',
    song: songTitle,
    reaction: run.reaction || '',
    hook: (run.hook >= 1 && run.hook <= 5) ? String(run.hook) : '',
    playlist: run.playlist || '',
    share: run.share || '',
    weak: run.weak || '',
    weakWhere: (run.weakWhere || '').trim(),
    remember: run.remember || '',
    comments: (run.comments || '').trim()
  };
}
// Sun/progress fraction 0..1 across the named steps (reveal = 1).
function progress(idx){ return Math.max(0, Math.min(1, idx / STEPS.length)); }
/* ======================== PURE-LOGIC-END ============================== */

/* ---------- sound + haptics ---------- */
var soundOn = localStorage.getItem('mosun_listen_sound') !== 'off';
var actx = null;
function tick(freq){
  if(!soundOn) return;
  try{
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    var o = actx.createOscillator(), g = actx.createGain();
    o.type = 'sine'; o.frequency.value = freq || 440;
    g.gain.setValueAtTime(0.0001, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.06, actx.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + 0.18);
    o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime + 0.2);
  }catch(e){}
}
function buzz(ms){ if(soundOn && navigator.vibrate) try{ navigator.vibrate(ms || 12); }catch(e){} }
function updateMute(){ var b = $('muteBtn'); if(b) b.textContent = soundOn ? 'Sound on' : 'Sound off'; }

/* ---------- ripple ---------- */
function ripple(x, y){
  if(prefersReduced) return;
  var r = document.createElement('div'); r.className = 'ripple';
  r.style.left = x + 'px'; r.style.top = y + 'px';
  document.body.appendChild(r);
  setTimeout(function(){ r.remove(); }, 640);
}
// Confirm feedback for any tap on an interactive target.
function juice(e, freq){
  var x, y;
  if(e && e.clientX != null){ x = e.clientX; y = e.clientY; }
  else if(e && e.currentTarget){ var rc = e.currentTarget.getBoundingClientRect(); x = rc.left + rc.width/2; y = rc.top + rc.height/2; }
  if(x != null) ripple(x, y);
  tick(freq); buzz(14);
}

/* ---------- particles ---------- */
var pcanvas, pctx, parts = [], praf = null;
function startParticles(){
  if(prefersReduced) return;
  pcanvas = $('particles'); pctx = pcanvas.getContext('2d');
  function size(){ pcanvas.width = innerWidth; pcanvas.height = innerHeight; }
  size(); addEventListener('resize', size);
  parts = [];
  var n = Math.min(46, Math.round(innerWidth / 16));
  for(var i = 0; i < n; i++){
    parts.push({ x: Math.random()*innerWidth, y: Math.random()*innerHeight,
      r: 0.6 + Math.random()*1.8, vx: 0.15 + Math.random()*0.5, a: 0.06 + Math.random()*0.22, drift: Math.random()*Math.PI*2 });
  }
  pcanvas.classList.add('on');
  (function frame(){
    pctx.clearRect(0,0,pcanvas.width,pcanvas.height);
    for(var i=0;i<parts.length;i++){
      var p = parts[i];
      p.x += p.vx; p.drift += 0.01; p.y += Math.sin(p.drift)*0.12;
      if(p.x > pcanvas.width + 4){ p.x = -4; p.y = Math.random()*pcanvas.height; }
      pctx.beginPath(); pctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      pctx.fillStyle = 'rgba(246,162,92,' + p.a + ')'; pctx.fill();
    }
    praf = requestAnimationFrame(frame);
  })();
}

/* ---------- sun progress ---------- */
function setSun(p){
  var s = $('sun');
  s.style.opacity = p <= 0 ? '0' : String(0.35 + p*0.5);
  // rises from below the horizon (175%) toward a low arc (-10%) as p→1
  var ty = 175 - p * 185;
  s.style.transform = 'translate(-50%, ' + ty + '%)';
  $('sky').style.background = 'radial-gradient(ellipse 90% 55% at 50% 118%, rgba(246,162,92,' + (0.05 + p*0.10) + '), transparent 62%)';
}

/* ---------- content ---------- */
var REACTIONS = [
  { v:'Fire',     em:'🔥', fl:'Fire' },
  { v:'Vibing',   em:'😌', fl:'Vibing' },
  { v:'Meh',      em:'😑', fl:'Meh' },
  { v:'Confused', em:'😕', fl:'Confused' },
  { v:'Skip',     em:'⏭️', fl:'Skip' }
];
var CHOICES = {
  playlist: { kicker:'Keep it', title:'Add it?',  prompt:'Would this make it onto your playlist?', opts:['Yes','Maybe','Probably not'] },
  share:    { kicker:'Pass it on', title:'Send it?', prompt:'Would you send this to a friend?',     opts:['Yes','Maybe','Probably not'] },
  remember: { kicker:'Stuck', title:'Hum it?',     prompt:'Can you hum or remember any part right now?', opts:['Yes','Not really'] }
};

/* ---------- run state + stage engine ---------- */
var cfg = null;
var run = {};
var idx = -1;            // -1 = title card; STEPS.length = reveal
var transitioning = false;

function swap(html, after){
  var st = $('stage');
  if(prefersReduced){ st.innerHTML = html; st.classList.add('in'); if(after) after(); return; }
  transitioning = true;
  st.classList.remove('in'); st.classList.add('leaving');
  setTimeout(function(){
    st.innerHTML = html; st.classList.remove('leaving'); st.classList.add('entering');
    requestAnimationFrame(function(){ requestAnimationFrame(function(){
      st.classList.remove('entering'); st.classList.add('in'); transitioning = false; if(after) after();
    }); });
  }, 470);
}
function scatter(str){
  return String(str).split('').map(function(c, i){
    if(c === ' ') return ' ';
    return '<span class="ch" style="transition-delay:' + (prefersReduced ? 0 : (50 + i*28)) + 'ms">' + esc(c) + '</span>';
  }).join('');
}
function footHtml(){
  return '<div class="foot">' +
    (idx > 0 ? '<button class="backlink" id="backBtn">← back</button>' : '<span></span>') +
    '<span class="navhint">tap to choose · <kbd>↑</kbd> back</span></div>';
}
function wireFoot(){ var b = $('backBtn'); if(b) b.addEventListener('click', function(){ go(-1); }); }

/* ---------- screens ---------- */
function orbMarkup(size){
  return cfg.c ? '<img class="orb ' + size + '" src="' + esc(cfg.c) + '" alt="">'
               : '<div class="orb ' + size + ' orbph">m</div>';
}
function renderTitle(){
  idx = -1; setSun(0);
  swap(
    '<div class="kicker">A MOSUN listening session</div>' +
    '<div class="titleorb"><div class="orbwrap">' + orbMarkup('big') + '</div></div>' +
    '<div class="qtitle">' + scatter(cfg.t) + '</div>' +
    '<div class="cap">Headphones up. One listen, honest reactions — it shapes the record.</div>' +
    '<div class="bigplay"><button class="btn primary" id="playBtn">Press play</button></div>',
    function(){
      $('playBtn').addEventListener('click', function(e){ juice(e, 523); startSession(); });
    });
}
function startSession(){
  // mount the DISCO player, start ambience, soft-unlock the first beat
  var np = $('np');
  var fr = document.createElement('iframe');
  fr.setAttribute('src', cfg.e);
  fr.setAttribute('allow', 'autoplay; encrypted-media; clipboard-write');
  fr.setAttribute('referrerpolicy', 'no-referrer-when-downgrade');
  fr.setAttribute('title', 'player');
  np.innerHTML = '<div class="orbwrap">' + orbMarkup('sm spin') + '</div>' +
                 '<div class="npt">Now playing · <b>' + esc(cfg.t) + '</b></div>' +
                 '<div class="discoframe" id="frHost"></div>';
  $('frHost').appendChild(fr);
  np.classList.add('on');
  $('muteBtn').classList.remove('hidden');
  startParticles();
  run = {};
  swap(
    '<div class="kicker">Let it play</div>' +
    '<div class="qtitle">' + scatter('Listen first') + '</div>' +
    '<div class="qprompt">Give it a few seconds. When you’re in it, start the questions — quick taps, honest gut.</div>' +
    '<div class="bigplay"><button class="btn primary" id="goBtn">I’m listening →</button></div>',
    function(){
      var b = $('goBtn');
      // soft-unlock: enable shortly after, but let them go immediately too
      b.addEventListener('click', function(e){ juice(e, 587); idx = 0; renderStep(); });
    });
}

function renderStep(){
  if(idx < 0) return renderTitle();
  if(idx >= STEPS.length) return renderReveal();
  setSun(progress(idx));
  var step = STEPS[idx];
  if(step === 'reaction') return renderReaction();
  if(step === 'hook') return renderHook();
  if(step === 'weak') return renderWeak();
  if(step === 'comments') return renderComments();
  if(step === 'name') return renderName();
  return renderChoice(step);
}
function go(delta){
  if(transitioning) return;
  idx += delta;
  if(idx < -0) idx = -1;
  renderStep();
}

function renderReaction(){
  var cur = run.reaction;
  var cells = REACTIONS.map(function(r){
    return '<button class="face' + (cur === r.v ? ' sel' : '') + '" data-v="' + r.v + '">' +
      '<span class="em">' + r.em + '</span><span class="fl">' + r.fl + '</span></button>';
  }).join('');
  swap(
    '<div class="kicker">First feeling · 1 / 6</div>' +
    '<div class="qtitle">' + scatter('Gut hit?') + '</div>' +
    '<div class="qprompt">No thinking. What did the first moments do to you?</div>' +
    '<div class="faces">' + cells + '</div>' + footHtml(),
    function(){
      wireFoot();
      $('stage').querySelectorAll('.face').forEach(function(el){
        el.addEventListener('click', function(e){ juice(e); run.reaction = el.getAttribute('data-v'); el.classList.add('sel'); setTimeout(function(){ go(1); }, 240); });
      });
    });
}

function renderHook(){
  var cur = run.hook || 0;
  var segs = '';
  for(var v = 1; v <= 5; v++) segs += '<div class="seg' + (v <= cur ? ' lit' : '') + '" data-v="' + v + '"></div>';
  swap(
    '<div class="kicker">The hook · 2 / 6</div>' +
    '<div class="qtitle">' + scatter('Charge it') + '</div>' +
    '<div class="qprompt">How catchy is the hook? Tap up the meter — or drag.</div>' +
    '<div class="charge">' +
      '<div class="meter" id="meter">' + segs + '</div>' +
      '<div class="chargenum"><span id="cnum"' + (cur ? '' : ' class="ghost"') + '>' + (cur || '·') + '</span><span class="of">out of 5</span></div>' +
    '</div>' +
    '<div class="chargelab"><span>1 · forgettable</span><span>5 · stuck in my head</span></div>' + footHtml(),
    function(){
      wireFoot();
      var meter = $('meter');
      var advTimer = null;
      function set(v, e){
        v = Math.max(1, Math.min(5, v));
        run.hook = v;
        meter.querySelectorAll('.seg').forEach(function(s){ s.classList.toggle('lit', parseInt(s.getAttribute('data-v'),10) <= v); });
        var cn = $('cnum'); cn.textContent = v; cn.classList.remove('ghost');
        if(e) juice(e, 392 + v*40); else { tick(392 + v*40); buzz(12); }
        clearTimeout(advTimer); advTimer = setTimeout(function(){ go(1); }, 750);   // charge, then release
      }
      meter.querySelectorAll('.seg').forEach(function(s){
        s.addEventListener('click', function(e){ set(parseInt(s.getAttribute('data-v'),10), e); });
      });
      // drag up/down across the meter
      function fromPoint(clientY){
        var r = meter.getBoundingClientRect();
        var frac = 1 - (clientY - r.top) / r.height;
        return Math.ceil(Math.max(0.001, Math.min(1, frac)) * 5);
      }
      var dragging = false;
      meter.addEventListener('pointerdown', function(e){ dragging = true; meter.setPointerCapture(e.pointerId); set(fromPoint(e.clientY)); });
      meter.addEventListener('pointermove', function(e){ if(dragging) set(fromPoint(e.clientY)); });
      meter.addEventListener('pointerup', function(){ dragging = false; });
    });
}

function renderChoice(key){
  var c = CHOICES[key];
  var cur = run[key];
  var opts = c.opts.map(function(o){ return '<button class="opt' + (cur === o ? ' sel' : '') + '" data-v="' + esc(o) + '">' + esc(o) + '</button>'; }).join('');
  var n = REQUIRED.indexOf(key) + 1;
  swap(
    '<div class="kicker">' + c.kicker + ' · ' + n + ' / 6</div>' +
    '<div class="qtitle">' + scatter(c.title) + '</div>' +
    '<div class="qprompt">' + c.prompt + '</div>' +
    '<div class="opts">' + opts + '</div>' + footHtml(),
    function(){
      wireFoot();
      $('stage').querySelectorAll('.opt').forEach(function(el){
        el.addEventListener('click', function(e){ juice(e); run[key] = el.getAttribute('data-v'); el.classList.add('sel'); setTimeout(function(){ go(1); }, 240); });
      });
    });
}

function renderWeak(){
  var cur = run.weak;
  swap(
    '<div class="kicker">Honest · 5 / 6</div>' +
    '<div class="qtitle">' + scatter('Any dead air?') + '</div>' +
    '<div class="qprompt">Did any part feel weak or boring?</div>' +
    '<div class="opts">' +
      '<button class="opt' + (cur === 'All good' ? ' sel' : '') + '" data-v="All good">All good — it held me</button>' +
      '<button class="opt' + (cur === 'Some parts' ? ' sel' : '') + '" data-v="Some parts">Some parts dipped</button>' +
    '</div>' +
    '<div id="whereWrap" class="' + (cur === 'Some parts' ? '' : 'hidden') + '" style="margin-top:18px">' +
      '<textarea class="field" id="whereIn" rows="2" placeholder="which part? verse, chorus, bridge, intro…">' + esc(run.weakWhere || '') + '</textarea>' +
      '<div class="actions" style="margin-top:12px"><button class="btn small primary" id="whereNext">Next →</button></div>' +
    '</div>' + footHtml(),
    function(){
      wireFoot();
      $('stage').querySelectorAll('.opt').forEach(function(el){
        el.addEventListener('click', function(e){
          juice(e); run.weak = el.getAttribute('data-v');
          $('stage').querySelectorAll('.opt').forEach(function(o){ o.classList.remove('sel'); }); el.classList.add('sel');
          if(run.weak === 'Some parts'){ $('whereWrap').classList.remove('hidden'); var w = $('whereIn'); if(w) w.focus(); }
          else { run.weakWhere = ''; setTimeout(function(){ go(1); }, 240); }
        });
      });
      var wn = $('whereNext');
      if(wn) wn.addEventListener('click', function(e){ run.weakWhere = $('whereIn').value; juice(e); go(1); });
    });
}

function renderComments(){
  swap(
    '<div class="kicker">Open mic · optional</div>' +
    '<div class="qtitle">' + scatter('Say more?') + '</div>' +
    '<div class="qprompt">Anything else on your mind — completely optional.</div>' +
    '<textarea class="field" id="cIn" rows="3" placeholder="whatever comes to mind…">' + esc(run.comments || '') + '</textarea>' +
    '<div class="foot"><button class="backlink" id="backBtn">← back</button>' +
    '<div class="actions"><button class="btn ghost small" id="skipBtn">Skip</button><button class="btn primary small" id="nextBtn">Next →</button></div></div>',
    function(){
      wireFoot();
      $('skipBtn').addEventListener('click', function(e){ run.comments = ''; juice(e); go(1); });
      $('nextBtn').addEventListener('click', function(e){ run.comments = $('cIn').value; juice(e); go(1); });
    });
}

function renderName(){
  swap(
    '<div class="kicker">Last thing · optional</div>' +
    '<div class="qtitle">' + scatter('Who’s this?') + '</div>' +
    '<div class="qprompt">A name so I can thank you — or stay a ghost.</div>' +
    '<input class="line" id="nIn" placeholder="your name (optional)" value="' + esc(run.name || '') + '" autocomplete="off">' +
    '<div class="foot"><button class="backlink" id="backBtn">← back</button>' +
    '<div class="actions"><button class="btn ghost small" id="ghostBtn">Stay anonymous</button><button class="btn primary small" id="sendBtn">Send it</button></div></div>',
    function(){
      wireFoot();
      $('ghostBtn').addEventListener('click', function(e){ run.name = ''; juice(e, 659); finish(); });
      $('sendBtn').addEventListener('click', function(e){ run.name = $('nIn').value; juice(e, 659); finish(); });
    });
}

/* ---------- finish / submit ---------- */
function finish(){
  var miss = missingRequired(run);
  if(miss.length){ idx = STEPS.indexOf(miss[0]); renderStep(); return; }
  idx = STEPS.length;
  renderReveal();
  submit();
}
function submit(){
  var p = buildParams(run, cfg.t);
  var usp = new URLSearchParams();
  Object.keys(p).forEach(function(k){ usp.append(k, p[k]); });
  var ss = $('sendState');
  fetch(SCRIPT_URL + '?' + usp.toString(), { mode: 'no-cors' })
    .then(function(){ if(ss){ ss.textContent = 'Received. Thank you — truly.'; ss.className = 'sendstate ok'; } })
    .catch(function(){
      if(ss){
        ss.innerHTML = 'Couldn’t send — <button class="backlink" id="retryBtn">try again</button>'; ss.className = 'sendstate err';
        var rb = $('retryBtn'); if(rb) rb.addEventListener('click', function(){ ss.textContent = 'Sending…'; ss.className = 'sendstate'; submit(); });
      }
    });
}
function renderReveal(){
  setSun(1);
  var note = (cfg.n || '').trim();
  swap(
    '<div class="reveal">' +
      '<div class="kicker">' + esc(cfg.t) + '</div>' +
      '<div class="thx">Sun’s up.</div>' +
      '<div class="note">' + (note ? esc(note) : 'You just helped shape this one. The version that makes the record will carry a little of your ear in it.') + '</div>' +
      '<div class="signed">mosun</div>' +
      '<div class="sendstate" id="sendState">Sending…</div>' +
    '</div>',
    function(){
      var sr = $('sunrise'); if(sr && !prefersReduced) requestAnimationFrame(function(){ sr.classList.add('on'); });
      tick(784); buzz([12, 40, 18]);
    });
}

/* ---------- keyboard (desktop) ---------- */
document.addEventListener('keydown', function(e){
  if(!cfg || idx < 0 || idx >= STEPS.length) return;
  var typing = /^(input|textarea)$/i.test((e.target.tagName || ''));
  if(e.key === 'ArrowUp'){ e.preventDefault(); go(-1); return; }
  if(typing) return;
  var step = STEPS[idx];
  if(step === 'reaction'){ var n = parseInt(e.key,10); if(n>=1 && n<=5){ run.reaction = REACTIONS[n-1].v; go(1); } }
  else if(step === 'hook'){ if(/^[1-5]$/.test(e.key)){ run.hook = parseInt(e.key,10); go(1); } }
  else { var c = CHOICES[step]; if(c && /^[1-9]$/.test(e.key)){ var i = parseInt(e.key,10)-1; if(c.opts[i]){ run[step] = c.opts[i]; go(1); } } }
});

/* ---------- mute ---------- */
$('muteBtn').addEventListener('click', function(){
  soundOn = !soundOn; localStorage.setItem('mosun_listen_sound', soundOn ? 'on' : 'off'); updateMute(); if(soundOn) tick(523);
});

/* =======================================================================
   BUILDER (shown when there is no valid #s= config)
   ======================================================================= */
function renderBuilder(){
  $('root').innerHTML =
    '<div class="topbar"><span class="markk">MOSUN<span class="dot"> · </span>LISTEN</span><span></span></div>' +
    '<div class="build">' +
      '<h2>Make a listening link</h2>' +
      '<p class="lead">Attach a demo, get a private link. The fan presses play and plays through the feedback.</p>' +
      '<div class="fld"><label>Song title</label><input class="bfield" id="bTitle" placeholder="e.g. Afraid of the Light"></div>' +
      '<div class="fld"><label>DISCO embed <span class="opt-tag">— paste the full &lt;iframe&gt; or just the src URL</span></label>' +
        '<textarea class="bfield" id="bEmbed" rows="3" placeholder="&lt;iframe src=&quot;https://…disco…&quot; …&gt;&lt;/iframe&gt;"></textarea>' +
        '<div class="berr" style="margin-top:8px;color:var(--n4)">In DISCO: Track → Share → Embed → Customize player → uncheck “Enable downloads”.</div></div>' +
      '<div class="fld"><label>Cover image URL <span class="opt-tag">— optional</span></label><input class="bfield" id="bCover" placeholder="https://…"></div>' +
      '<div class="fld"><label>Insider note <span class="opt-tag">— optional, shown at the end</span></label><textarea class="bfield" id="bNote" rows="2" placeholder="a line just for them — a hidden lyric, a thank-you…"></textarea></div>' +
      '<button class="btn primary" id="bMake">Create link</button>' +
      '<div class="berr" id="bErr"></div>' +
      '<div class="out" id="bOut">' +
        '<label style="font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--n3)">Shareable fan link</label>' +
        '<textarea class="lk" id="bLink" readonly onclick="this.select()"></textarea>' +
        '<div class="outbtns"><button class="btn small primary" id="bCopy">Copy link</button>' +
        '<button class="btn small" id="bPreview">Preview it →</button></div>' +
      '</div>' +
      '<p class="foott">This page is unlisted. Each link carries its song in the URL — long and unguessable. Feedback lands in your Responses sheet tagged with the title, so the dashboard keeps working.</p>' +
    '</div>';

  $('bMake').addEventListener('click', function(){
    var t = $('bTitle').value.trim();
    var e = extractEmbed($('bEmbed').value);
    var err = $('bErr');
    if(!t){ err.textContent = 'Add a song title.'; return; }
    if(!e){ err.textContent = 'Paste a valid DISCO embed (an https iframe or URL).'; return; }
    err.textContent = '';
    var conf = { t: t, e: e };
    var cov = $('bCover').value.trim(); if(cov) conf.c = cov;
    var note = $('bNote').value.trim(); if(note) conf.n = note;
    var link = location.origin + location.pathname + '#s=' + b64urlEncode(JSON.stringify(conf));
    $('bLink').value = link; $('bOut').classList.add('on');
    $('bCopy').onclick = function(){ navigator.clipboard && navigator.clipboard.writeText(link); $('bCopy').textContent = 'Copied ✓'; setTimeout(function(){ $('bCopy').textContent = 'Copy link'; }, 1600); };
    $('bPreview').onclick = function(){ location.hash = 's=' + b64urlEncode(JSON.stringify(conf)); location.reload(); };
  });
}

/* ---------- boot ---------- */
updateMute();
cfg = readConfig();
if(cfg){ renderTitle(); }
else { renderBuilder(); }
</script>
</body>
</html>
